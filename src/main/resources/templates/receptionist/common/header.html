<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <body>

        <header class="top-header" th:fragment="header(pageTitle)">

            <div class="header-left">
                <span class="breadcrumb-text">Tiếp Tân</span>
                <span class="breadcrumb-separator">›</span>
                <strong class="breadcrumb-current" th:text="${pageTitle}"></strong>
            </div>

            <div class="header-right">

                <div class="system-status">
                    <span class="status-icon">⌁</span>
                    <span>Đang Hoạt Động</span>
                </div>

                <div class="header-divider"></div>


                <details class="header-user-dropdown">

                    <summary class="header-user">
                        <div class="header-avatar" th:text="${receptionist.avatarText}">PL</div>

                        <div class="header-user-info">
                            <strong th:text="${receptionist.fullName}">Phạm Thị Linh</strong>
                            <p>Tiếp tân</p>
                        </div>

                        <span class="header-arrow">⌄</span>
                    </summary>

                    <div class="header-dropdown-menu">
                        <form th:action="@{/logout}" method="post" class="dropdown-logout-form">
                            <th:block th:if="${_csrf != null}">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">
                            </th:block>

                            <button type="submit" class="dropdown-item logout-item">
                                Đăng xuất
                            </button>
                        </form>
                    </div>

                </details>

            </div>

        </header>
    </body>
</html>
