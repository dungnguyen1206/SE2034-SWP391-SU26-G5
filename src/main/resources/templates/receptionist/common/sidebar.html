<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

    <body>

        <aside class="sidebar" th:fragment="sidebar(activeMenu)">

            <a th:href="@{/}" class="brand" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px; cursor: pointer;">
                <div class="brand-icon">
                    <i class="bi bi-hospital"></i>
                </div>

                <div>
                    <h2>Bệnh Viện</h2>
                    <p>HAMS HOSPITAL</p>
                </div>
            </a>



            <!-- Menu -->
            <div class="menu-title">CHỨC NĂNG</div>

            <nav class="menu">

                <a th:href="@{/receptionist/dashboard}" class="menu-item"
                   th:classappend="${activeMenu == 'dashboard'} ? ' active'">
                    <span class="menu-icon">🏠</span>
                    <span>Trang Chủ</span>
                </a>

                <a th:href="@{/receptionist/appointment}" class="menu-item"
                   th:classappend="${activeMenu == 'appointment'} ? ' active'">
                    <span class="menu-icon">📅</span>
                    <span>Lịch Hẹn</span>
                </a>

                <a th:href="@{/receptionist/queue}" class="menu-item" th:classappend="${activeMenu == 'queue'} ? ' active'">
                    <span class="menu-icon">👥</span>
                    <span>Hàng Đợi Khám</span>
                </a>

                <a th:href="@{/receptionist/invoice}" class="menu-item"
                   th:classappend="${activeMenu == 'invoice'} ? ' active'">
                    <span class="menu-icon">🧾</span>
                    <span>Hóa Đơn</span>
                </a>

                <a th:href="@{/notifications/list}" class="menu-item"
                   th:classappend="${activeMenu == 'notifications'} ? ' active'">
                    <span class="menu-icon">🔔</span>
                    <span>Thông Báo</span>
                    <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                          th:text="${unreadNotificationCount}"
                          class="notif-badge">
                    </span>
                </a>

            </nav>

        </aside>

    </body>

</html>
