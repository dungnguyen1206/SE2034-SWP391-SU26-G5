<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Hóa Đơn</title>

    <link rel="stylesheet" th:href="@{/css/receptionist/common/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/receptionist/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/receptionist/invoice/list.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
<div class="layout">

    <!-- Sidebar -->
    <div th:replace="~{receptionist/common/sidebar :: sidebar('invoice')}"></div>

    <main class="main">

        <!-- Header -->
        <div th:replace="~{receptionist/common/header :: header('Quản lý Hóa đơn')}"></div>

        <section class="appointment-card" style="margin-top: 28px;">

            <!-- Search And Filter -->
            <form class="appointment-toolbar" th:action="@{/receptionist/invoice}" method="get">
                <div class="search-box">
                    <span class="search-icon"> ⌕ </span>
                    <input type="text" name="keyword" placeholder="Mã HĐ, Tên bệnh nhân..." th:value="${keyword}">
                </div>

                <select class="status-filter" name="paymentStatus">
                    <option value="" th:selected="${paymentStatus == ''}">Tất cả trạng thái</option>
                    <option value="UNPAID" th:selected="${paymentStatus == 'UNPAID'}">Chưa thanh toán</option>
                    <option value="PAID" th:selected="${paymentStatus == 'PAID'}">Đã thanh toán</option>
                </select>

                <button type="submit" class="btn-search">Tìm Kiếm</button>
                <a th:href="@{/receptionist/invoice}" class="btn-reset">Làm Mới</a>
            </form>

            <div class="table-wrapper">
                <table class="appointment-table">
                    <thead>
                    <tr>
                        <th>STT</th>
                        <th>Mã Lịch Hẹn</th>
                        <th>Bệnh nhân</th>
                        <th>SĐT</th>
                        <th>Tổng Tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    <tbody th:if="${invoicePage != null && !invoicePage.empty}">
                    <tr th:each="inv, iterStat : ${invoicePage.content}">
                        <td th:text="${iterStat.count + (invoicePage.number * invoicePage.size)}"></td>
                        <td>
                            <span class="appointment-code" th:text="${inv.appointmentCode}"></span>
                        </td>
                        <td th:text="${inv.patientFullName}"></td>
                        <td th:text="${inv.phone != null ? inv.phone : '-'}"></td>
                        <td>
                            <strong style="color: #2563eb;" th:text="${inv.displayAmount != null ? #numbers.formatDecimal(inv.displayAmount, 0, 'COMMA', 0, 'POINT') : '0'} + ' đ'"></strong>
                        </td>
                        <td>
                            <span th:if="${inv.paymentStatus == 'UNPAID'}" class="status-badge status-cancelled">
                                Chưa thanh toán
                            </span>
                            <span th:if="${inv.paymentStatus == 'PAID'}" class="status-badge status-completed">
                                Đã thanh toán
                            </span>
                        </td>
                        <td class="action-cell">
                            <a th:if="${inv.paymentStatus == 'UNPAID'}"
                               class="btn-checkin"
                               th:href="@{/receptionist/invoice/{id}(id=${inv.appointmentId})}">Thanh toán</a>
                            <a th:if="${inv.paymentStatus == 'PAID'}"
                               class="btn-detail"
                               th:href="@{/receptionist/invoice/{id}(id=${inv.appointmentId})}">Chi tiết</a>
                        </td>
                    </tr>
                    </tbody>

                    <!-- Không có dữ liệu -->
                    <tbody th:if="${invoicePage == null || invoicePage.empty}">
                    <tr>
                        <td colspan="7" class="empty-row">Không có hóa đơn nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-footer"
                 th:if="${invoicePage != null and invoicePage.totalPages > 1}"
                 th:with="maxPages=5,
                          halfMax=${maxPages / 2},
                          startPage=${invoicePage.number - halfMax < 0 ? 0 : 
                                     (invoicePage.number + halfMax >= invoicePage.totalPages ? 
                                      (invoicePage.totalPages - maxPages < 0 ? 0 : invoicePage.totalPages - maxPages) : 
                                      invoicePage.number - halfMax)},
                          endPage=${startPage + maxPages - 1 >= invoicePage.totalPages ? invoicePage.totalPages - 1 : startPage + maxPages - 1}">

                <div class="pagination-info">
                    <span th:text="'Trang ' + ${invoicePage.number + 1} + ' / ' + ${invoicePage.totalPages}">
                        Trang 1 / 1
                    </span>

                    <span th:text="'Tổng: ' + ${invoicePage.totalElements} + ' hóa đơn'">
                        Tổng: 0 hóa đơn
                    </span>
                </div>

                <div class="pagination">

                    <a class="page-btn"
                       th:classappend="${invoicePage.first} ? ' disabled'"
                       th:href="@{/receptionist/invoice(
                            page=${invoicePage.number - 1},
                            keyword=${keyword},
                            paymentStatus=${paymentStatus}
                       )}">
                        Trước
                    </a>

                    <a class="page-number"
                       th:each="pageNumber : ${#numbers.sequence(startPage, endPage)}"
                       th:classappend="${pageNumber == invoicePage.number} ? ' active'"
                       th:href="@{/receptionist/invoice(
                            page=${pageNumber},
                            keyword=${keyword},
                            paymentStatus=${paymentStatus}
                       )}"
                       th:text="${pageNumber + 1}">
                    </a>

                    <a class="page-btn"
                       th:classappend="${invoicePage.last} ? ' disabled'"
                       th:href="@{/receptionist/invoice(
                            page=${invoicePage.number + 1},
                            keyword=${keyword},
                            paymentStatus=${paymentStatus}
                       )}">
                        Sau
                    </a>

                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
