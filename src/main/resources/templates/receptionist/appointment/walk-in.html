<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
        <title>Tạo Lịch Khám Trực Tiếp</title>

        <link rel="stylesheet" th:href="@{/css/receptionist/common/sidebar.css}">
        <link rel="stylesheet" th:href="@{/css/receptionist/common/header.css}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" th:href="@{/css/receptionist/appointment/walk-in.css}">
    </head>
    <body>
        <div class="layout">
            <div th:replace="~{receptionist/common/sidebar :: sidebar('appointment')}"></div>

            <main class="main">
                <div th:replace="~{receptionist/common/header :: header('Tạo Lịch Khám Trực Tiếp')}"></div>

                <section class="walk-in-container">
                    <h2 class="walk-in-title">Nhập thông tin bệnh nhân</h2>

                    <form th:action="@{/receptionist/appointment/walk-in}" method="get">
                        <div class="form-group">
                            <label>Số điện thoại <span class="required-asterisk">*</span></label>
                            <div class="d-flex">
                                <input type="text" name="phone" id="phone" class="form-control flex-grow-1"
                                       placeholder="Nhập số điện thoại bệnh nhân" th:value="${phone}">

                                <button type="submit" class="btn btn-primary" id="btnSearch">
                                    <span class="btn-text">Kiểm tra</span>
                                </button>
                            </div>

                            <small id="phoneMsg" class="msg-error"
                                   th:if="${phoneError}" th:text="${phoneError}"></small>

                            <small class="msg-success"
                                   th:if="${patientFound != null && patientFound}">Bệnh nhân cũ.</small>

                            <small class="msg-info"
                                   th:if="${patientFound != null && !patientFound}">Bệnh nhân mới. Vui lòng nhập thông
                                tin.</small>
                        </div>
                    </form>

                    <form th:action="@{/receptionist/appointment/walk-in/book}" method="post"
                          th:if="${patientFound != null}">
                        <input type="hidden" name="phone" th:value="${phone}">

                        <div class="patient-info" id="patientInfoSection">
                            <div class="d-flex patient-info-row">
                                <div class="flex-grow-1">
                                    <label>Họ (Last Name)</label>
                                    <input type="text" name="lastName" id="lastName" class="form-control"
                                           placeholder="VD: Nguyễn" th:value="${lastName}" th:readonly="${patientFound}"
                                           required>
                                </div>
                                <div class="flex-grow-1">
                                    <label>Tên (First Name)</label>
                                    <input type="text" name="firstName" id="firstName" class="form-control"
                                           placeholder="VD: Văn A" th:value="${firstName}" th:readonly="${patientFound}"
                                           required>
                                </div>
                                <div class="flex-grow-1">
                                    <label>Giới tính</label>
                                    <select name="gender" id="gender" class="form-control"
                                            th:disabled="${patientFound}">
                                        <option value="MALE" th:selected="${gender == 'MALE'}">Nam</option>
                                        <option value="FEMALE" th:selected="${gender == 'FEMALE'}">Nữ</option>
                                    </select>
                                    <input th:if="${patientFound}" type="hidden" name="gender" th:value="${gender}">
                                </div>
                            </div>
                        </div>

                        <div class="form-group" id="departmentSection">
                            <label>Khoa Khám Bệnh <span class="required-asterisk">*</span></label>
                            <select name="departmentId" id="departmentId" class="form-control"
                                    onchange="submitGetForm(this.value, document.getElementById('bookingDate').value)"
                                    required>
                                <option value="">-- Chọn khoa --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"
                                        th:selected="${departmentId == dept.id}"></option>
                            </select>
                        </div>
                        
                        <div class="form-group" id="serviceSection" th:if="${services != null && !services.isEmpty()}">
                            <label>Dịch Vụ Khám <span class="required-asterisk">*</span></label>
                            <select name="serviceId" id="serviceId" class="form-control"
                                    onchange="submitGetForm(document.getElementById('departmentId').value, document.getElementById('bookingDate').value)" required>
                                <option value="">-- Chọn dịch vụ --</option>
                                <option th:each="svc : ${services}" 
                                        th:value="${svc.id}" 
                                        th:text="${svc.name + ' - ' + #numbers.formatDecimal(svc.referencePrice != null ? svc.referencePrice : 0, 0, 'COMMA', 0, 'POINT') + ' đ'}"
                                        th:selected="${serviceId == svc.id}"></option>
                            </select>
                        </div>

                        <div class="form-group" id="dateSection">
                            <label>Ngày Khám <span class="required-asterisk">*</span></label>
                            <input type="date" name="bookingDate" id="bookingDate" class="form-control"
                                   th:value="${bookingDate}"
                                   onchange="submitGetForm(document.getElementById('departmentId').value, this.value)"
                                   required>
                        </div>

                        <div class="form-group" id="slotSection" th:if="${departmentId != null}">
                            <label>Khung Giờ Khám <span class="required-asterisk">*</span></label>
                            <select name="timeSlotId" id="timeSlotId" class="form-control" required>
                                <option value="">-- Chọn khung giờ --</option>
                                <option th:each="slot : ${slots}" th:value="${slot.id}"
                                        th:text="${slot.time} + (${!slot.available} ? ' (Đã qua hoặc kín chỗ)' : '')"
                                        th:disabled="${!slot.available}"></option>
                            </select>
                            <div id="slotErrorMsg" class="slot-error-msg"
                                 th:if="${errorMessage}" th:text="${errorMessage}"></div>
                        </div>

                        <div class="action-buttons">
                            <a th:href="@{/receptionist/appointment}" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-success" id="btnSubmit">
                                <span class="btn-text">Xác nhận tạo lịch</span>
                            </button>
                        </div>
                    </form>
                </section>
            </main>
        </div>

        <script>
            function submitGetForm(deptId, dateStr) {
                const phone = document.getElementById('phone').value;
                let url = '/receptionist/appointment/walk-in?phone=' + phone;
                if (deptId) url += '&departmentId=' + deptId;
                if (dateStr) url += '&bookingDate=' + dateStr;
                
                const serviceSelect = document.getElementById('serviceId');
                if (serviceSelect && serviceSelect.value) {
                    url += '&serviceId=' + serviceSelect.value;
                }
                
                window.location.href = url;
            }
        </script>
    </body>
</html>
