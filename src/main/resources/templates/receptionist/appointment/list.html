<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Quản Lý Lịch Hẹn</title>

        <link rel="stylesheet" th:href="@{/css/receptionist/common/sidebar.css}">
        <link rel="stylesheet" th:href="@{/css/receptionist/common/header.css}">
        <link rel="stylesheet" th:href="@{/css/receptionist/appointment/list.css}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    </head>

    <body>
        <div class="layout">

            <!-- Sidebar -->
            <div th:replace="~{receptionist/common/sidebar :: sidebar('appointment')}"></div>

            <main class="main">

                <!-- Header -->
                <div th:replace="~{receptionist/common/header :: header('Lịch Hẹn')}"></div>

                <section class="appointment-stats">
                    <div class="stat-card stat-confirmed">
                        <h2 th:text="${confirmedCount}"></h2>
                        <p>Đã Xác Nhận</p>
                    </div>

                    <div class="stat-card stat-waiting">
                        <h2 th:text="${waitingCount}"></h2>
                        <p>Chờ Khám</p>
                    </div>

                    <div class="stat-card stat-examining">
                        <h2 th:text="${examiningCount}"></h2>
                        <p>Đang Khám</p>
                    </div>

                    <div class="stat-card stat-completed">
                        <h2 th:text="${completedCount}"></h2>
                        <p>Đã Khám Xong</p>
                    </div>

                    <div class="stat-card stat-cancelled">
                        <h2 th:text="${cancelledCount}"></h2>
                        <p>Đã Hủy</p>
                    </div>

                    <div class="stat-card stat-no-show">
                        <h2 th:text="${noShowCount}"></h2>
                        <p>Vắng Mặt</p>
                    </div>
                </section>

                <!-- Appointment List -->
                <section class="appointment-card">

                    <!-- Search And Filter -->
                    <form class="appointment-toolbar" th:action="@{/receptionist/appointment}" method="get">
                        <div class="search-box">
                            <span class="search-icon"> ⌕ </span>

                            <input type="text" name="search" placeholder="Tìm kiếm bệnh nhân..." th:value="${search}">
                        </div>

                        <select class="status-filter" name="status">
                            <option value="" th:selected="${selectedStatus == null || selectedStatus == ''}">Tất cả
                                trạng thái
                            </option>

                            <option value="CONFIRMED" th:selected="${selectedStatus == 'CONFIRMED'}">Đã xác nhận
                            </option>

                            <option value="WAITING" th:selected="${selectedStatus == 'WAITING'}">Chờ khám</option>

                            <option value="EXAMINING" th:selected="${selectedStatus == 'EXAMINING'}">Đang khám</option>

                            <option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">Đã khám xong
                            </option>

                            <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">Đã hủy</option>

                            <option value="NO_SHOW" th:selected="${selectedStatus == 'NO_SHOW'}">Vắng mặt</option>
                        </select>

                        <input type="date" name="fromDate" class="date-filter" th:value="${fromDate}">

                        <input type="date" name="toDate" class="date-filter" th:value="${toDate}">

                        <button type="submit" class="btn-search">Tìm Kiếm</button>

                        <a th:href="@{/receptionist/appointment}" class="btn-reset">Làm Mới</a>
                        
                        <a th:href="@{/receptionist/appointment/walk-in}" class="btn-walk-in" style="background: #28a745; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                            <i class="bi bi-plus-circle"></i> Trực Tiếp
                        </a>
                    </form>

                    <div class="table-wrapper">
                        <table class="appointment-table">
                            <thead>
                                <tr>
                                    <th>Mã LH</th>
                                    <th>Slot</th>
                                    <th>Phòng</th>
                                    <th>Bệnh nhân</th>
                                    <th>SĐT</th>
                                    <th>Bác sĩ</th>
                                    <th>Khoa</th>
                                    <th>Ngày giờ</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>

                            <!-- Group theo ngày -->
                            <tbody th:each="group : ${appointmentGroups}">

                                <!-- Dòng ngày -->
                                <tr class="date-group-row">
                                    <td colspan="10">
                                        <div class="date-group-header">
                                            <div class="date-left">
                                                <span class="date-icon">📅</span>

                                                <strong th:text="${#temporals.format(group.bookingDate, 'dd/MM/yyyy')}">
                                                    03/06/2026
                                                </strong>

                                                <span class="today-badge" th:if="${group.today}">
                                                    Hôm nay
                                                </span>
                                            </div>

                                            <div class="date-total"
                                                 th:text="${group.totalAppointments + ' lịch hẹn'}">
                                                0 lịch hẹn
                                            </div>
                                        </div>
                                    </td>
                                </tr>

                                <!-- Danh sách lịch hẹn trong ngày -->
                                <tr th:each="appointment : ${group.appointments}">
                                    <td>
                                        <a class="appointment-code"
                                           th:href="@{/receptionist/appointment/{id}(id=${appointment.id})}"
                                           th:text="${appointment.appointmentCode}">
                                        </a>
                                    </td>

                                    <td th:text="${appointment.slotText}"></td>

                                    <td>
                                        <span class="room-badge"
                                              th:text="${appointment.roomNumber != null ? appointment.roomNumber : '-'}">
                                        </span>
                                    </td>

                                    <td th:text="${appointment.patientFullName}"></td>

                                    <td th:text="${appointment.patientPhone != null ? appointment.patientPhone : '-'}"></td>

                                    <td th:text="${appointment.doctorFullName != null ? appointment.doctorFullName : '-'}"></td>

                                    <td th:text="${appointment.departmentName != null ? appointment.departmentName : '-'}"></td>

                                    <td>
                                        <span th:if="${appointment.bookingDate != null}"
                                              th:text="${#temporals.format(appointment.bookingDate, 'dd/MM/yyyy')}">
                                        </span>
                                    </td>

                                    <td>
                                        <span class="status-badge"
                                              th:classappend="${appointment.statusClass}"
                                              th:text="${appointment.statusLabel}">
                                        </span>
                                    </td>

                                    <td class="action-cell">
                                        <a class="btn-detail"
                                           th:href="@{/receptionist/appointment/{id}(id=${appointment.id})}">
                                            Chi tiết
                                        </a>

                                        <a th:if="${appointment.status == 'CONFIRMED'}"
                                           class="btn-checkin"
                                           th:href="@{/receptionist/appointment/{id}/check-in-ticket(id=${appointment.id})}">
                                            Check-in
                                        </a>
                                    </td>
                                </tr>
                            </tbody>

                            <!-- Không có dữ liệu -->
                            <tbody th:if="${appointmentGroups == null || appointmentGroups.isEmpty()}">
                                <tr>
                                    <td colspan="10" class="empty-row">
                                        Không có lịch hẹn nào
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination-footer"
                         th:if="${appointmentPage != null && appointmentPage.totalPages > 0}">

                        <div class="pagination-info">
                            <span th:text="'Trang ' + ${appointmentPage.number + 1} + ' / ' + ${appointmentPage.totalPages}">
                                Trang 1 / 1
                            </span>

                            <span th:text="'Tổng: ' + ${appointmentPage.totalElements} + ' lịch hẹn'">
                                Tổng: 0 lịch hẹn
                            </span>
                        </div>

                        <div class="pagination">

                            <a class="page-btn"
                               th:classappend="${appointmentPage.first} ? ' disabled'"
                               th:href="@{/receptionist/appointment(
                                    page=${appointmentPage.number - 1},
                                    search=${search},
                                    status=${selectedStatus},
                                    fromDate=${fromDate},
                                    toDate=${toDate}
                               )}">
                                Trước
                            </a>

                            <a class="page-number"
                               th:each="pageNumber : ${#numbers.sequence(0, appointmentPage.totalPages - 1)}"
                               th:classappend="${pageNumber == appointmentPage.number} ? ' active'"
                               th:href="@{/receptionist/appointment(
                                    page=${pageNumber},
                                    search=${search},
                                    status=${selectedStatus},
                                    fromDate=${fromDate},
                                    toDate=${toDate}
                               )}"
                               th:text="${pageNumber + 1}">
                            </a>

                            <a class="page-btn"
                               th:classappend="${appointmentPage.last} ? ' disabled'"
                               th:href="@{/receptionist/appointment(
                                    page=${appointmentPage.number + 1},
                                    search=${search},
                                    status=${selectedStatus},
                                    fromDate=${fromDate},
                                    toDate=${toDate}
                               )}">
                                Sau
                            </a>

                        </div>
                    </div>
                </section>
            </main>
        </div>
    </body>
</html>
