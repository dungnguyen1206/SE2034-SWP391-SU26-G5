<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm / Sửa bài viết</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-articles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
<div class="manager-layout">

    <div th:replace="~{manager/fragments/sidebar :: managerSidebar('articles')}"></div>

    <main class="manager-main">
        <header class="article-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <a th:href="@{/manager/articles}" class="staff-back-link" title="Quay lại" style="font-size: 20px; color: #64748b; text-decoration: none;">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div class="article-header-title">
                    <h2>Thêm / Sửa bài viết</h2>
                    <p>Tạo mới hoặc cập nhật bài viết y tế trên hệ thống</p>
                </div>
            </div>
        </header>

        <form th:action="${articleId != null ? '/manager/articles/edit/' + articleId : '/manager/articles/create'}" method="post" th:object="${articleRequest}" enctype="multipart/form-data">
            <div class="article-form-layout">
                
                <!-- Left Column -->
                <div class="article-form-main">
                    
                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Tiêu đề bài viết <span>*</span></label>
                            <input type="text" class="form-control" th:field="*{title}" placeholder="Nhập tiêu đề bài viết..." required>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Ảnh bìa (Thumbnail)</label>
                            <input type="file" class="form-control" th:field="*{thumbnailFile}" accept="image/*">
                            <div th:if="*{currentThumbnailUrl != null}" style="margin-top: 10px;">
                                <p style="font-size: 13px; color: #64748b; margin-bottom: 5px;">Ảnh bìa hiện tại:</p>
                                <img th:src="*{currentThumbnailUrl}" alt="Thumbnail" style="max-width: 200px; border-radius: 4px; border: 1px solid #e2e8f0;">
                                <!-- Hidden field to keep track of the current URL when updating -->
                                <input type="hidden" th:field="*{currentThumbnailUrl}">
                            </div>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Tóm tắt / Đoạn trích</label>
                            <textarea class="form-control" th:field="*{summary}" placeholder="Viết 1-2 câu tóm tắt hiển thị trên danh sách bài viết..."></textarea>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Nội dung bài viết</label>
                            <!-- TinyMCE Rich Text Editor -->
                            <textarea class="editor-placeholder" th:field="*{content}" style="width: 100%; min-height: 400px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; padding: 16px; font-family: inherit;" placeholder="Viết toàn bộ nội dung bài viết tại đây..."></textarea>
                        </div>
                    </div>

                </div>

                <!-- Right Column (Sidebar) -->
                <div class="article-form-sidebar">
                    
                    <div class="form-card">
                        <div class="form-card-title">Cài đặt xuất bản</div>
                        
                        <label class="publish-option">
                            <input type="radio" th:field="*{status}" value="DRAFT">
                            <div class="dot draft"></div>
                            <span>Bản nháp</span>
                        </label>

                        <label class="publish-option">
                            <input type="radio" th:field="*{status}" value="PUBLISHED">
                            <div class="dot published"></div>
                            <span>Đã xuất bản</span>
                        </label>
                    </div>

                    <div class="form-card">
                        <div class="form-card-title">Thông tin bài viết</div>
                        
                        <div class="form-group">
                            <label class="form-label">Chuyên mục <span>*</span></label>
                            <select class="form-control" th:field="*{category}" required>
                                <option value="" disabled selected>Chọn chuyên mục...</option>
                                <option value="Tim mạch">Tim mạch</option>
                                <option value="Nhi khoa">Nhi khoa</option>
                                <option value="Da liễu">Da liễu</option>
                                <option value="Sức khỏe">Sức khỏe</option>
                                <option value="Dinh dưỡng">Dinh dưỡng</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tác giả</label>
                            <select class="form-control" th:field="*{doctorId}">
                                <option value="">Chọn tác giả (Admin nếu để trống)...</option>
                                <option th:each="doc : ${doctors}" th:value="${doc.id}" th:text="${doc.fullName}"></option>
                            </select>
                        </div>

                    </div>

                    <div class="form-card" style="background: transparent; border: none; padding: 0;">
                        <button type="submit" class="btn-publish">Xác nhận tạo bài viết</button>
                        <a th:href="@{/manager/articles}" class="btn-cancel">Hủy bỏ</a>
                    </div>

                </div>

            </div>
        </form>

    </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js" referrerpolicy="origin"></script>
<script>
    tinymce.init({
        selector: '.editor-placeholder',
        plugins: 'lists link image table code help wordcount',
        toolbar: 'undo redo | formatselect | bold italic | alignleft aligncenter alignright | bullist numlist outdent indent | link image | code',
        height: 500,
        menubar: false,
        promotion: false, // Disables the "Upgrade" button
        setup: function (editor) {
            editor.on('change', function () {
                editor.save(); // Ensures the textarea gets updated with the HTML content before form submit
            });
        }
    });
</script>

<style>
    .cursor-pointer { cursor: pointer; transition: color 0.2s; }
    .cursor-pointer:hover { color: #0f172a; }
    /* Hide any remaining TinyMCE warnings */
    .tox-notifications-container { display: none !important; }
</style>
</body>
</html>
