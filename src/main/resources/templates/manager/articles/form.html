<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm / Sửa bài viết</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-articles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
<div class="manager-layout">

    <div th:replace="~{manager/fragments/sidebar :: managerSidebar('articles')}"></div>

    <main class="manager-main">
        <header class="article-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <a th:href="@{/manager/articles}" class="staff-back-link" title="Quay lại" style="font-size: 20px; color: #64748b; text-decoration: none;">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div class="article-header-title">
                    <h2>Thêm / Sửa bài viết</h2>
                    <p>Tạo mới hoặc cập nhật bài viết y tế trên hệ thống</p>
                </div>
            </div>
        </header>

        <form action="#" method="post">
            <div class="article-form-layout">
                
                <!-- Left Column -->
                <div class="article-form-main">
                    
                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Tiêu đề bài viết <span>*</span></label>
                            <input type="text" class="form-control" placeholder="Nhập tiêu đề bài viết..." required>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Tóm tắt / Đoạn trích</label>
                            <textarea class="form-control" placeholder="Viết 1-2 câu tóm tắt hiển thị trên danh sách bài viết..."></textarea>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-group">
                            <label class="form-label">Nội dung bài viết</label>
                            <!-- Mocking the WYSIWYG Editor interface -->
                            <div style="border: 1px solid #e2e8f0; border-bottom: none; border-radius: 8px 8px 0 0; padding: 10px; background: #f8fafc; display: flex; gap: 12px; color: #64748b;">
                                <i class="bi bi-type-bold cursor-pointer"></i>
                                <i class="bi bi-type-italic cursor-pointer"></i>
                                <i class="bi bi-link-45deg cursor-pointer"></i>
                                <i class="bi bi-list-ul cursor-pointer"></i>
                                <i class="bi bi-image cursor-pointer"></i>
                            </div>
                            <textarea class="editor-placeholder" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 0 0 8px 8px; outline: none; padding: 16px; font-family: inherit;" placeholder="Viết toàn bộ nội dung bài viết tại đây. Sử dụng các tiêu đề rõ ràng, gạch đầu dòng và ngôn ngữ ngắn gọn..."></textarea>
                        </div>
                    </div>

                </div>

                <!-- Right Column (Sidebar) -->
                <div class="article-form-sidebar">
                    
                    <div class="form-card">
                        <div class="form-card-title">Cài đặt xuất bản</div>
                        
                        <label class="publish-option">
                            <input type="radio" name="status" value="DRAFT" checked>
                            <div class="dot draft"></div>
                            <span>Bản nháp</span>
                        </label>

                        <label class="publish-option">
                            <input type="radio" name="status" value="PUBLISHED">
                            <div class="dot published"></div>
                            <span>Đã xuất bản</span>
                        </label>
                    </div>

                    <div class="form-card">
                        <div class="form-card-title">Thông tin bài viết</div>
                        
                        <div class="form-group">
                            <label class="form-label">Chuyên mục <span>*</span></label>
                            <select class="form-control" required>
                                <option value="" disabled selected>Chọn chuyên mục...</option>
                                <option value="Tim mạch">Tim mạch</option>
                                <option value="Nhi khoa">Nhi khoa</option>
                                <option value="Da liễu">Da liễu</option>
                                <option value="Sức khỏe">Sức khỏe</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tác giả</label>
                            <select class="form-control">
                                <option value="" disabled selected>Chọn tác giả...</option>
                                <option value="1">BS. Trần Minh Tuấn</option>
                                <option value="2">BS. Ngô Thị Linh</option>
                                <option value="3">Admin</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Thẻ (Tags)</label>
                            <input type="text" class="form-control" placeholder="tim mạch, sức khỏe...">
                            <small style="color: #94a3b8; font-size: 12px; margin-top: 4px; display: block;">Các thẻ cách nhau bởi dấu phẩy</small>
                        </div>
                    </div>

                    <div class="form-card" style="background: transparent; border: none; padding: 0;">
                        <button type="submit" class="btn-publish">Xuất bản bài viết</button>
                        <button type="button" class="btn-draft"><i class="bi bi-save"></i> Lưu bản nháp</button>
                        <a th:href="@{/manager/articles}" class="btn-cancel">Hủy bỏ</a>
                    </div>

                </div>

            </div>
        </form>

    </main>

</div>

<style>
    .cursor-pointer { cursor: pointer; transition: color 0.2s; }
    .cursor-pointer:hover { color: #0f172a; }
</style>
</body>
</html>
