<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết bài viết</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-articles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
<div class="manager-layout">

    <div th:replace="~{manager/fragments/sidebar :: managerSidebar('articles')}"></div>

    <main class="manager-main">
        
        <header class="article-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <a th:href="@{/manager/articles}" class="staff-back-link" title="Quay lại" style="color: #64748b; font-size: 20px; text-decoration: none;">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div class="article-header-title">
                    <h2>Chi tiết bài viết</h2>
                    <p>Xem thông tin chi tiết bài viết, tin tức</p>
                </div>
            </div>
            
            <div class="article-actions">
                <a th:href="@{'/manager/articles/edit/' + ${article.id}}" class="article-create-button" style="background: #00a651;">
                    <i class="bi bi-pencil-square"></i> Chỉnh sửa
                </a>
            </div>
        </header>

        <!-- Main Article Container -->
        <div class="article-detail-card" th:if="${article != null}">
            
            <!-- Huge Title -->
            <h1 class="article-title-main" th:text="${article.title}">Tiêu đề bài viết</h1>
            
            <!-- Simple Meta Data -->
            <div class="article-meta-simple">
                <span th:text="${article.createdAt != null ? #temporals.format(article.createdAt, 'dd/MM/yyyy') : ''}">26-06-2026</span>
                <span class="dot-separator">•</span>
                <span class="meta-cat" th:text="${article.category}">Khoa nhi</span>
                <span class="dot-separator">•</span>
                <span th:text="${article.doctorAuthor != null ? article.doctorAuthor.fullName : (article.createdBy != null ? article.createdBy.fullName : 'Admin')}">Tác giả</span>
            </div>

            <!-- Highlighted Summary Box (like the image) -->
            <div class="article-summary-box" th:if="${article.summary != null and !article.summary.isEmpty()}">
                <div class="summary-header">
                    <strong>Tóm tắt ý chính bài viết</strong>
                </div>
                <div class="summary-body" th:text="${article.summary}">
                    Đoạn tóm tắt sẽ hiển thị ở đây với chữ đậm...
                </div>
            </div>

            <!-- WYSIWYG HTML Content -->
            <div class="article-body-text" th:utext="${article.content}">
                Nội dung bài viết
            </div>
        </div>

        <!-- Fallback if not found -->
        <div th:if="${article == null}" style="padding: 48px; background: white; border-radius: 12px; border: 1px solid #e2e8f0;">
            <p>Bài viết không tồn tại.</p>
            <a th:href="@{/manager/articles}" style="color: #3b82f6;">Quay lại danh sách</a>
        </div>

    </main>

</div>
</body>
</html>
