<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách bài viết</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-articles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
<div class="manager-layout">

    <div th:replace="~{manager/fragments/sidebar :: managerSidebar('articles')}"></div>

    <main class="manager-main">

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert-message alert-success">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert-message alert-error">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <header class="article-header">
            <div class="article-header-title">
                <h2>Danh sách bài viết y tế</h2>
                <p><span th:text="${totalItems}">0</span> bài viết</p>
            </div>
            <a th:href="@{/manager/articles/create}" class="article-create-button">
                <i class="bi bi-plus-lg"></i> Viết bài mới
            </a>
        </header>

        <!-- Search and Filter -->
        <form class="article-filter-card" th:action="@{/manager/articles}" method="get">
            <div class="article-search-box">
                <i class="bi bi-search"></i>
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm bài viết theo tiêu đề...">
                <button type="submit" style="display:none;"></button>
            </div>
            
            <div class="article-filter-row">
                <div class="filter-group">
                    <span class="filter-label">Chuyên mục:</span>
                    <select name="category" class="form-control filter-select" onchange="this.form.submit()">
                        <option value="" th:selected="${category == null or category == ''}">Tất cả</option>
                        <option value="Tim mạch" th:selected="${category == 'Tim mạch'}">Tim mạch</option>
                        <option value="Nhi khoa" th:selected="${category == 'Nhi khoa'}">Nhi khoa</option>
                        <option value="Da liễu" th:selected="${category == 'Da liễu'}">Da liễu</option>
                        <option value="Sức khỏe" th:selected="${category == 'Sức khỏe'}">Sức khỏe</option>
                        <option value="Dinh dưỡng" th:selected="${category == 'Dinh dưỡng'}">Dinh dưỡng</option>
                    </select>
                </div>

                <div class="filter-group">
                    <span class="filter-label">Trạng thái:</span>
                    <select name="status" class="form-control filter-select" onchange="this.form.submit()">
                        <option value="" th:selected="${status == null or status == ''}">Tất cả</option>
                        <option value="PUBLISHED" th:selected="${status == 'PUBLISHED'}">Đã xuất bản</option>
                        <option value="DRAFT" th:selected="${status == 'DRAFT'}">Bản nháp</option>
                    </select>
                </div>
                
                <div class="filter-group" style="margin-left: auto;">
                    <a th:href="@{/manager/articles}" class="filter-clear-link">Xóa lọc</a>
                </div>
            </div>
        </form>

        <!-- Article Card List -->
        <div class="article-list-container">
            
            <div th:each="article : ${articleList}" class="article-card">
                <div class="article-card-left" style="display: flex; gap: 16px; align-items: center;">
                    <div th:if="${article.thumbnailUrl != null}" style="flex-shrink: 0; width: 120px; height: 80px; border-radius: 8px; overflow: hidden; background: #e2e8f0;">
                        <img th:src="${article.thumbnailUrl}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div th:if="${article.thumbnailUrl == null}" style="flex-shrink: 0; width: 120px; height: 80px; border-radius: 8px; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8;">
                        <i class="bi bi-image" style="font-size: 24px;"></i>
                    </div>

                    <div class="article-info">
                        <a th:href="@{'/manager/articles/detail/' + ${article.id}}" class="article-title" th:text="${article.title}">Tiêu đề bài viết</a>
                        <div class="article-meta">
                            <span class="meta-category" th:text="${article.category}">Chuyên mục</span>
                            <span class="meta-separator">•</span>
                            <span>Bởi <span th:text="${article.doctorAuthor != null ? article.doctorAuthor.fullName : (article.createdBy != null ? article.createdBy.fullName : 'Admin')}">Tác giả</span></span>
                            <span class="meta-separator">•</span>
                            <span th:text="${article.createdAt != null ? #temporals.format(article.createdAt, 'dd/MM/yyyy') : ''}">2026-05-15</span>
                        </div>
                    </div>
                </div>
                <div class="article-card-right">
                    <span class="status-badge" th:classappend="${article.status == 'PUBLISHED'} ? 'published' : 'draft'"
                          th:text="${article.status == 'PUBLISHED'} ? 'Đã xuất bản' : 'Bản nháp'">
                    </span>
                    <div class="card-actions">
                        <a th:href="@{'/manager/articles/detail/' + ${article.id}}" class="action-btn" title="Xem chi tiết"><i class="bi bi-eye"></i></a>
                        <a th:href="@{'/manager/articles/edit/' + ${article.id}}" class="action-btn" title="Chỉnh sửa"><i class="bi bi-pencil-square"></i></a>
                        <form th:action="@{'/manager/articles/delete/' + ${article.id}}" method="post" style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa bài viết này không?');">
                            <button type="submit" class="action-btn delete" title="Xóa"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(articleList)}" class="article-empty-state">
                <i class="bi bi-folder-x"></i>
                <p>Không có bài viết nào.</p>
            </div>

        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="article-pagination">
            <span class="pagination-info"
                  th:text="'Trang ' + ${currentPage + 1} + ' / ' + ${totalPages}"></span>

            <a th:if="${currentPage > 0}"
               th:href="@{/manager/articles(keyword=${keyword}, category=${category}, status=${status}, page=${currentPage - 1})}"
               class="pager-button">
                <i class="bi bi-chevron-left"></i> Trước
            </a>
            <span th:if="${currentPage == 0}" class="pager-button disabled">
                <i class="bi bi-chevron-left"></i> Trước
            </span>

            <!-- Always show page 1 -->
            <a th:if="${totalPages >= 1}" class="pager-button" th:classappend="${currentPage == 0} ? 'active' : ''" th:text="1" th:href="@{/manager/articles(keyword=${keyword}, category=${category}, status=${status}, page=0)}">1</a>

            <!-- Show left ellipsis -->
            <span th:if="${currentPage > 2}" style="padding: 0 8px; color: #64748b; align-self: center;">...</span>

            <!-- Show window (currentPage is 0-indexed) -->
            <th:block th:if="${totalPages > 2}" th:each="i : ${#numbers.sequence(currentPage - 1 > 0 ? currentPage - 1 : 1, currentPage + 1 < totalPages - 1 ? currentPage + 1 : totalPages - 2)}">
                <a th:if="${i >= 1 and i < totalPages - 1}" class="pager-button" th:classappend="${currentPage == i} ? 'active' : ''" th:text="${i + 1}" th:href="@{/manager/articles(keyword=${keyword}, category=${category}, status=${status}, page=${i})}"></a>
            </th:block>

            <!-- Show right ellipsis -->
            <span th:if="${currentPage < totalPages - 3}" style="padding: 0 8px; color: #64748b; align-self: center;">...</span>

            <!-- Always show last page -->
            <a th:if="${totalPages > 1}" class="pager-button" th:classappend="${currentPage == totalPages - 1} ? 'active' : ''" th:text="${totalPages}" th:href="@{/manager/articles(keyword=${keyword}, category=${category}, status=${status}, page=${totalPages - 1})}"></a>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/manager/articles(keyword=${keyword}, category=${category}, status=${status}, page=${currentPage + 1})}"
               class="pager-button">
                Sau <i class="bi bi-chevron-right"></i>
            </a>
            <span th:if="${currentPage >= totalPages - 1}" class="pager-button disabled">
                Sau <i class="bi bi-chevron-right"></i>
            </span>
        </div>

    </main>

</div>
</body>
</html>
