<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Manager</title>

  <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <th:block layout:fragment="pageCss"></th:block>
</head>
<body>

<div class="manager-layout">
  <div th:replace="~{manager/fragments/sidebar :: managerSidebar(${activeMenu})}"></div>

  <main class="manager-main">
    <div th:replace="~{manager/fragments/header :: managerHeader(${pageTitle}, ${pageSubtitle})}"></div>

    <div class="manager-content">
      <div layout:fragment="content"></div>
    </div>
  </main>
</div>

<th:block layout:fragment="pageScript"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</body>
</html>
