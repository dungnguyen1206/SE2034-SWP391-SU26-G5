<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/manager/fragments/layout}"
      th:with="pageTitle='Tổng quan về dịch vụ y tế', pageSubtitle='Theo dõi về các loại dịch vụ y tế của bệnh viện' , activeMenu='service'">
<head>
    <meta charset="UTF-8">
    <title>Tổng quan dịch vụ</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-schedules.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-service.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-invoices.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<div layout:fragment="content">
    <div>
        <form th:action="@{/manager/services/update}" th:object="${updateMedicalServiceRequest}" method="post">
            <div class="card shadow-sm border-0 mb-4">

                <!-- Thông báo lỗi , Thành công -->
                <div class="card-body p-4">
                    <div class="alert alert-success" role="alert" th:if="${successMessage != null}"
                         th:text="${successMessage}">
                        <i class="bi bi-check-circle-fill me-2"></i> Lưu dữ liệu thành công!
                    </div>
                    <div th:if="${#fields.hasErrors('price')}" class="alert alert-danger" role="alert"
                         th:errors="*{price}"></div>
                    <div th:if="${#fields.hasErrors('duration')}" class="alert alert-danger" role="alert"
                         th:errors="*{duration}"></div>

                    <h5 class="card-title mb-4" style="color: #a8a8a8; font-weight: 700;">Cập nhật dịch vụ</h5>
                    <input type="hidden" th:field="*{serviceId}">

                    <div class="row g-3">
                        <!-- Hàng 1: Tên dịch vụ -->
                        <div class="col-12">
                            <label for="serviceName" class="form-label">Tên dịch vụ</label>
                            <input type="text" class="form-control bg-light" id="serviceName"
                                   th:value="${updateMedicalServiceRequest.getMedicalServiceName()}" readonly>
                        </div>

                        <!-- Hàng 2: Khoa, Giá, Thời gian -->
                        <div class="col-md-4">
                            <label for="departmentName" class="form-label">Khoa</label>
                            <input type="text" class="form-control bg-light" id="departmentName"
                                   th:value="${updateMedicalServiceRequest.department.getName()}" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="price">Giá dịch vụ (VNĐ)</label>
                            <input type="number" class="form-control" th:field="*{price}">
                        </div>
                        <div class="col-md-4">
                            <label for="duration" class="form-label">Thời gian khám dự kiến (Phút)</label>
                            <input type="number" class="form-control" th:field="*{duration}">
                        </div>

                        <!-- Hàng 3: Trạng thái và Ghi chú -->
                        <div class="col-md-4">
                            <label for="status" class="form-label">Trạng thái</label>
                            <select class="select form-select" th:field="*{status}">
                                <option th:value="ACTIVE">Hoạt động bình thường</option>
                                <option th:value="INACTIVE">Ngưng phục vụ</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label for="note" class="form-label">Ghi chú</label>
                            <textarea class="form-control" style="min-height: 38px;"
                                      th:field="*{description}"></textarea>
                        </div>

                        <!-- Hàng 4: Upload ảnh -->
                        <div class="col-md-4 mt-4">
                            <label class="form-label fw-bold">Hình ảnh dịch vụ</label>
                            <div class="card border">
                                <div class="card-body p-0" style="height: 200px;">
                                    <div class="upload-box d-flex flex-column align-items-center justify-content-center"
                                         style="width: 100%; height: 100%; background:#F6F3EE; border:2px dashed #E8DFD0; position:relative; overflow:hidden; border-radius: 6px;">

                                        <div th:if="${updateMedicalServiceRequest.getImageUrl() == null || updateMedicalServiceRequest.getImageUrl() == ''}"
                                             class="text-center">
                                            <i class="bi bi-cloud-arrow-up"
                                               style="font-size: 30px; color:#C9A84C;"></i>
                                            <p class="mb-0 mt-1" style="color:#C9A84C; font-size: 15px;">Tải ảnh
                                                dịch vụ lên</p>
                                        </div>

                                        <img th:if="${updateMedicalServiceRequest.getImageUrl() != null && updateMedicalServiceRequest.getImageUrl() != ''}"
                                             th:src="${updateMedicalServiceRequest.getImageUrl()}"
                                             alt="ảnh dịch vụ"
                                             style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1;">

                                        <input type="file" name="itemImage" accept="image/*"
                                               style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; z-index: 2;">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Hàng cuối: Nút bấm xử lý -->
                        <div class="col-12 mt-4 d-flex gap-2">
                            <a class="btn btn-secondary px-4" th:href="@{/manager/services/list}">Quay lại</a>
                            <button type="submit" class="btn btn-primary px-4">Lưu thay đổi</button>
                        </div>
                    </div> <!-- Kết thúc row g-3 -->

                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
