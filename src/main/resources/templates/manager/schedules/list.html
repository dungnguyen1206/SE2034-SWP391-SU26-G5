<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý lịch làm việc</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-schedules.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<div class="manager-layout">
    <div th:replace="~{manager/fragments/sidebar :: managerSidebar('schedule')}"></div>

    <!--SCHEDULE MANAGEMENT - MAIN CONTENT-->
    <main class="manager-main schedule-page">

        <!--SCHEDULE MANAGEMENT - PAGE HEADER-->
        <header class="schedule-page-header">
            <div>
                <div class="schedule-title-row">
                    <h2>Quản lý lịch làm việc</h2>
                    <span class="schedule-status-badge "
                          th:classappend="${presentWeek.getStatus()=='DRAFT' ? 'draft' : (presentWeek.getStatus()=='PUBLISHED' ? 'published' : 'finalized' )}"
                          th:text="${presentWeek.getStatus()=='DRAFT' ? 'Bản nháp' : (presentWeek.getStatus()=='PUBLISHED' ? 'Bản hoàn chỉnh' : 'Hoàn tất' )}">Hoàn tất</span>
                </div>
                <p>Quản lý lịch trực của bác sĩ theo ngày, ca, phòng</p>
            </div>

            <div class="schedule-lock-note">
                <th:block th:if="${presentWeek.getStatus()=='PUBLISHED'}">
                    <form th:action="@{/manager/schedules/{weekScheduleId}/list(weekScheduleId=${presentWeek.getId()},action ='DRAFT',departmentId=${departmentId},doctorName=${doctorName},shift=${shift},page=${doctorScheduleRowResponsePage.number},size=${doctorScheduleRowResponsePage.size})}"
                          method="post">
                        <button type="submit" class="btn-draft"><i class="bi bi-send"></i>
                            Trở về bản nháp
                        </button>
                    </form>
                    <form th:action="@{/manager/schedules/{weekScheduleId}/list(weekScheduleId=${presentWeek.getId()},action ='FINALIZED',departmentId=${departmentId},doctorName=${doctorName},shift=${shift},page=${doctorScheduleRowResponsePage.number},size=${doctorScheduleRowResponsePage.size})}"
                          method="Post">
                        <button type="submit" class="btn-publish"><i class="bi bi-send"></i> Hoàn tất lịch làm việc
                        </button>
                    </form>
                </th:block>

                <th:block th:if="${presentWeek.getStatus()=='DRAFT'}">
                    <form th:action="@{/manager/schedules/{weekScheduleId}/list(weekScheduleId=${presentWeek.getId()},action ='PUBLISHED',departmentId=${departmentId},doctorName=${doctorName},shift=${shift},page=${doctorScheduleRowResponsePage.number},size=${doctorScheduleRowResponsePage.size})}"
                          method="post">
                        <button type="submit" class="btn-publish">
                            <i class="bi bi-send"></i> Công bố lịch làm việc
                        </button>
                    </form>
                </th:block>


                <!--    Sau cả tiến ở đây nếu cần     -->
                <th:block th:if="${presentWeek.getStatus()=='FINALIZED' || presentWeek.getStatus()=='EXPIRED'}">
                    <i class="bi bi-lock"></i>
                    Lịch đã hoàn tất
                </th:block>
            </div>
        </header>

        <!--SCHEDULE MANAGEMENT - CONTEXT BANNER-->
        <section class="schedule-banner">
            <i class="bi bi-exclamation-triangle"></i>
            <strong th:if="${presentWeek.getStatus()=='DRAFT' || presentWeek.getStatus()=='PUBLISHED'}">Hạn chốt: Chủ
                nhật 23:59</strong>
            <span th:text="${presentWeek.getStatus()=='FINALIZED' ? 'Lịch tuần này đã được chốt' : (presentWeek.getStatus()=='EXPIRED' ? 'Lịch tuần đã quá thời hạn' : 'Lịch tuần này chưa được chốt') }">lịch tuần này chưa được chốt</span>
        </section>

        <input id="createShiftToggle" class="schedule-panel-toggle" type="checkbox">

        <div class="schedule-workspace">
            <div class="schedule-main-column">

                <!--SCHEDULE MANAGEMENT - TOOLBAR-->
                <section class="schedule-toolbar">
                    <div class="schedule-toolbar-left">
                        <a class="schedule-icon-button" aria-label="Tuần trước"
                           th:if="${prevWeekId!=null}"
                           th:href="@{/manager/schedules/list(weekScheduleId=${prevWeekId},departmentId=${departmentId},doctorName=${doctorName},shift=${shift})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                        <button th:if="${prevWeekId==null}" disabled><i class="bi bi-chevron-left"></i></button>

                        <button class="schedule-week-button" type="button"
                                th:text="'Tuần '+ ${presentWeek.getId()} + ' - ' + ${#temporals.format(presentWeek.getStartDate(), 'dd/MM/yyyy')} +' - '+${#temporals.format(presentWeek.getEndDate(), 'dd/MM/yyyy')}">
                            <i class="bi bi-calendar-week"></i>
                            Tuần 24 — 09/06–15/06/2025
                        </button>

                        <a class="schedule-icon-button" aria-label="Tuần sau"
                           th:if="${nextWeekId!=null}"
                           th:href="@{/manager/schedules/list(weekScheduleId=${nextWeekId},departmentId=${departmentId},doctorName=${doctorName},shift=${shift})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                        <button th:if="${nextWeekId==null}" disabled><i class="bi bi-chevron-right"></i></button>


                        <form th:action="@{/manager/schedules/list}" method="GET">
                            <input type="hidden" name="weekScheduleId" th:value="${presentWeek.id}">
                            <select class="schedule-control" aria-label="Khoa" name="departmentId">
                                <option value="">Tất cả khoa</option>
                                <option th:each="department : ${departments}"
                                        th:value="${department.getId()}"
                                        th:text="${department.getName()}"
                                        th:selected="${department.getId() == departmentId}">Tim mạch
                                </option>
                            </select>

                            <select class="schedule-control" aria-label="Loại ca" name="shift">
                                <option value="ALL">Tất cả ca</option>
                                <option value="MORNING" th:selected="${shift=='MORNING'}">Ca sáng</option>
                                <option value="AFTERNOON" th:selected="${shift=='AFTERNOON'}">Ca chiều</option>
                                <option value="FULL_DAY" th:selected="${shift=='FULL_DAY'}">Cả ngày</option>
                            </select>

                            <input class="schedule-search" name="doctorName" type="text" placeholder="Tìm bác sĩ"
                                   th:value="${doctorName}">
                            <button type="submit" class="search-box"><i class="bi bi-funnel"></i></button>
                        </form>
                    </div>

                    <label th:unless="${presentWeek.status == 'FINALIZED' or presentWeek.status == 'EXPIRED'}"
                           class="schedule-primary-button"
                           for="createShiftToggle">
                        <i class="bi bi-plus-lg"></i> Tạo ca làm việc
                    </label>

                    <span th:if="${presentWeek.status == 'FINALIZED' or presentWeek.status == 'EXPIRED'}"
                          class="schedule-primary-button disabled-btn">
                           <i class="bi bi-plus-lg"></i> Tạo ca làm việc
                          </span>
                </section>

                <!--SCHEDULE MANAGEMENT - TABLE-->
                <section class="schedule-table-card">
                    <table class="schedule-table">
                        <thead>
                        <tr>
                            <th>Bác sĩ</th>
                            <th th:each="workdate,stt : ${workdates}"
                                th:text="${stt.count == 7 ? 'Chủ nhật' : 'Thứ ' + (stt.count+1)} + ' - ' + ${#temporals.format(workdate, 'dd/MM/yyyy')}">
                            </th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="row : ${doctorScheduleRowResponsePage.content}">
                            <td class="doctor-cell">
                                <div class="schedule-doctor">
                                    <div class="schedule-avatar">
                                        <img th:if="${row.doctor.avatar != null}"
                                             th:src="${row.doctor.avatar}" alt="avatar"/>
                                        <i th:unless="${row.doctor.avatar !=null}"
                                           class="bi bi-person"></i>
                                    </div>
                                    <div>
                                        <strong th:text="${row.doctor.fullName}">BS. Nguyễn Văn A</strong>
                                        <span th:text="'STF-'+${row.doctor.id} + ' · ' + ${row.doctor.departmentName}">STF-001 · Tim mạch</span>
                                    </div>
                                </div>
                            </td>
                            <td th:each="date : ${workdates}"
                                th:with="cell=${row.scheduleByDate.get(date)}">
                                <!-- Ô trống -->
                                <div th:if="${cell==null}" class="empty-shift">—</div>

                                <!-- Ô có ca -->
                                <article th:if="${cell!=null}"
                                         class="shift-card "
                                         th:classappend="${cell.shift == 'MORNING' ? 'morning' : (cell.shift == 'AFTERNOON' ? 'afternoon' : 'full-day')}">
                                    <div class="shift-card-header" style="display: flex;">
                                        <strong th:text="${cell.shift}">Ca sáng</strong>
                                        <a th:if="${presentWeek.getStatus()!='EXPIRED'}" th:href="@{/manager/schedules/update(weekScheduleId=${presentWeek.getId()},doctorScheduleId=${cell.id},departmentId=${departmentId},doctorName=${row.doctor.fullName},doctorNameFilter=${doctorName},shift=${shift},page=${doctorScheduleRowResponsePage.number},size=${doctorScheduleRowResponsePage.size},departmentName=${row.doctor.departmentName} )}">
                                           <i class="bi bi-pencil" style="color: #00a651"></i>
                                        </a>
                                    </div>
                                    <p th:text="${cell.roomName}">Phòng 101</p>
                                    <div class="shift-meta">
                                        <span class="shift-status "
                                              th:classappend="${cell.status == 'ACTIVE' ? 'available' : 'cancelled'}"
                                              th:text="${cell.status == 'ACTIVE' ? 'Đang hoạt động' : 'Đã hủy'}">Còn trống</span>
                                    </div>
                                </article>

                            </td>

                        </tr>

                        </tbody>
                    </table>

                    <!--SCHEDULE MANAGEMENT - TABLE FOOTER-->
                    <footer class="schedule-table-footer">
                        <div class="schedule-legend">
                            <span>Ca:</span>
                            <i class="legend-dot morning"></i> Ca sáng
                            <i class="legend-dot afternoon"></i> Ca chiều
                            <i class="legend-dot full-day"></i> Cả ngày
                        </div>

                        <div class="schedule-pagination">
                            <span th:text="'Trang hiện tại ' +${doctorScheduleRowResponsePage.number + 1}+
                            ' trong '+${doctorScheduleRowResponsePage.totalPages} ">
                            </span>
                            <a th:if="${!doctorScheduleRowResponsePage.first}"
                               th:href="@{/manager/schedules/list(weekScheduleId=${presentWeek.id},page=${doctorScheduleRowResponsePage.number - 1},size=${doctorScheduleRowResponsePage.size},departmentId=${departmentId},doctorName=${doctorName},shift=${shift})}"
                               class="pager-button">Trước</a>
                            <span th:if="${doctorScheduleRowResponsePage.first}"
                                  class="pager-button disabled">Trước</span>

                            <a th:if="${!doctorScheduleRowResponsePage.last}"
                               th:href="@{/manager/schedules/list(weekScheduleId=${presentWeek.id},page=${doctorScheduleRowResponsePage.number + 1},size=${doctorScheduleRowResponsePage.size},departmentId=${departmentId},doctorName=${doctorName},shift=${shift})}"
                               class="pager-button">Sau</a>
                            <span th:if="${doctorScheduleRowResponsePage.last}" class="pager-button disabled">Sau</span>
                        </div>
                    </footer>
                </section>
            </div>

            <div th:replace="~{manager/schedules/create :: createShiftPanel}"></div>
        </div>
    </main>
</div>
</body>
</html>
