<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/manager/fragments/layout}"
      th:with="pageTitle='Cập nhật hồ sơ nhân viên', pageSubtitle='Chỉnh sửa thông tin hồ sơ của bác sĩ hoặc lễ tân đã có tài khoản' , activeMenu='staff'">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật hồ sơ nhân viên</title>
    <link rel="stylesheet" th:href="@{/css/manager/manager-common.css}">
    <link rel="stylesheet" th:href="@{/css/manager/manager-staff.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="manager-layout" layout:fragment="content">

    <!-- STAFF UPDATE - Page content -->
    <main class="manager-main-staff">
        <!-- STAFF UPDATE - Header -->
        <div th:if="${successMessage}" class="staff-form-success">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- STAFF UPDATE - Form error -->
        <div th:if="${errorMessage}" class="staff-form-alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- STAFF UPDATE - Manager updates a selected staff user by staffId from URL -->
        <form class="staff-form"
              method="post"
              enctype="multipart/form-data"
              th:action="@{/manager/staff/{staffId}/edit(staffId=${updateUserForm.id})}"
              th:object="${updateUserForm}" id="updateUserForm">

            <div th:replace="~{fragments/user-update-form :: metaFields}"></div>


            <div class="staff-form-layout">
                <div class="staff-form-main">

                    <!-- STAFF UPDATE - Common fields from users table -->
                    <section class="staff-form-card">
                        <div class="staff-form-card-header">
                            <i class="bi bi-card-text"></i>
                            <h3>Thông tin hồ sơ</h3>
                        </div>

                        <div class="staff-form-grid">
                            <div th:replace="~{fragments/user-update-form :: commonFields('STAFF')}"></div>
                        </div>

                        <div class="staff-role-note staff-account-note">
                            <i class="bi bi-info-circle"></i>
                            <span>Email đang gắn với tài khoản đăng nhập.</span>
<!--                            <em>Luồng đổi vai trò và tạo tài khoản nằm ở Admin/Register.</em>-->
                        </div>
                    </section>

                    <!-- STAFF UPDATE - Doctor-only fields -->
                    <section class="staff-form-card staff-doctor-card"
                             th:if="${updateUserForm.profileType == 'DOCTOR'}">
                        <div class="staff-form-card-header">
                            <i class="bi bi-shield-plus"></i>
                            <h3>Hồ sơ bác sĩ</h3>
                            <span class="staff-section-badge doctor">Chỉ dành cho bác sĩ</span>
                        </div>

                        <div class="staff-form-grid">
                            <div th:replace="~{fragments/user-update-form :: doctorFields}"></div>
                        </div>
                    </section>

                    <!-- STAFF UPDATE - Receptionist-only fields -->
                    <section class="staff-form-card staff-receptionist-card"
                             th:if="${updateUserForm.profileType == 'RECEPTIONIST'}">
                        <div class="staff-form-card-header">
                            <i class="bi bi-person"></i>
                            <h3>Hồ sơ lễ tân</h3>
                            <span class="staff-section-badge receptionist">Chỉ dành cho lễ tân</span>
                        </div>

                        <div class="staff-form-grid">
                            <div th:replace="~{fragments/user-update-form :: receptionistFields}"></div>
                        </div>
                    </section>
                </div>

                <aside class="staff-form-side">

                    <!-- STAFF UPDATE - Account status readonly -->
                    <section class="staff-form-card">
                        <div class="staff-form-side-title">Trạng thái tài khoản</div>
                        <div class="staff-status-text"
                             th:classappend="*{accountStatus == 'ACTIVE'} ? ' active' : ' inactive'">
                             <span class="staff-status-dot"
                              th:classappend="*{accountStatus == 'ACTIVE'} ? ' active' : ' inactive'"></span>
                            <strong th:text="*{accountStatus == 'ACTIVE'} ? 'Đang hoạt động' : 'Ngưng hoạt động'">
                                Đang hoạt động
                            </strong>
                        </div>

                        <input type="hidden" th:field="*{accountStatus}">
                    </section>

                    <!-- STAFF UPDATE - Avatar upload placeholder -->
                    <section class="staff-form-card">
                        <div class="staff-form-side-title">Ảnh đại diện</div>
                        <div class="staff-photo-preview" id="staff-photo-preview">
                            <img th:if="${updateUserForm.avatar != null and updateUserForm.avatar != ''}"
                                 th:src="${updateUserForm.avatar}"
                                 alt="Avatar"/>
                                <input type="hidden" th:field="*{avatar}">
                            <i th:unless="${updateUserForm.avatar != null and updateUserForm.avatar != ''}"
                               class="bi bi-person"></i>
                        </div>
                        <input id="staffAvatarFile" class="staff-file-input" type="file" name="avatarFile" accept="image/*">
                        <label for="staffAvatarFile" class="staff-upload-button">Tải ảnh lên</label>
                    </section>

                    <!-- STAFF UPDATE - Actions -->
                    <section class="staff-form-card">
                        <button type="submit" class="staff-save-button">
                            <i class="bi bi-save"></i>
                            <span th:text="${updateUserForm.profileType == 'DOCTOR'} ? 'Lưu hồ sơ bác sĩ' : 'Lưu hồ sơ lễ tân'">
                                Lưu hồ sơ
                            </span>
                        </button>
                        <a th:href="@{/manager/staff/list}" class="staff-cancel-button">Hủy</a>
                    </section>

                    <!-- STAFF UPDATE - Role note -->
                    <section class="staff-role-help">
                        <h4>Ghi chú về quyền chỉnh sửa</h4>
                        <p>Manager chỉ cập nhật hồ sơ staff đã có role:</p>
                        <div><span class="staff-help-badge doctor">ROLE_DOCTOR</span> Bác sĩ</div>
                        <div><span class="staff-help-badge receptionist">ROLE_RECEPTIONIST</span> Lễ tân</div>
                    </section>
                </aside>
            </div>
        </form>
    </main>

</div>

<!-- Vì sử dụng layout:decorate để tạo layout chung ==> nếu để phần JS ở ngoài thì nó sẽ không nhận được ==> có thể sửa dụng 2 cách
    1.Là sử dụng hay tạo 1 layout:fragment chung cho javascript
    2.Là đưa đoạn JavaScript vào trong khung layout:Fragment: content nếu không làm theo cách 1-->
<script th:inline="javascript" layout:fragment="pageScript">
    const staffPhotoPreview = document.getElementById('staff-photo-preview');
    const staffAvatar = document.getElementById("staffAvatarFile");
    const updateUserForm = document.getElementById("updateUserForm");

    staffAvatar.addEventListener("change", (e) => {

        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            staffPhotoPreview.innerHTML = "";

            const newImg = document.createElement("img");
            newImg.src = url;
            newImg.alt = "Avatar";
            staffPhotoPreview.appendChild(newImg);
        }

    })

    updateUserForm.addEventListener("submit", (e) => {
        e.preventDefault();
        Swal.fire({
            title: 'Xác nhận thay đổi?',
            text:'Thông tin sau chỉnh sửa của nhân viên sẽ được lưu vào hệ thống!',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Xác nhận thay đổi',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                updateUserForm.submit();
            }
        })
    })

</script>
</body>
</html>
