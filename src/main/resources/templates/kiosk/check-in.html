<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Check-in | Benh vien HAMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px 0;
        }
        body::before, body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
        }
        body::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #3b82f6, transparent);
            top: -200px; left: -200px;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #06b6d4, transparent);
            bottom: -200px; right: -200px;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(40px); }
        }
        .kiosk-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 680px;
            padding: 24px;
        }
        .kiosk-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 32px;
            padding: 56px 48px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }
        .logo-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            margin: 0 auto 28px;
            animation: pulse-ring 2.5s ease infinite;
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
            70%  { box-shadow: 0 0 0 20px rgba(59,130,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }
        .kiosk-hospital-name {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .kiosk-title {
            font-size: 36px;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 6px;
        }
        .kiosk-subtitle {
            font-size: 17px;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .time-display {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
            color: #cbd5e1;
            font-size: 16px;
            font-weight: 500;
        }
        .kiosk-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            color: #f1f5f9;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 5px;
            padding: 20px 24px;
            text-transform: uppercase;
            transition: all 0.25s ease;
            outline: none;
            margin-bottom: 20px;
        }
        .kiosk-input::placeholder {
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
            font-size: 17px;
            font-weight: 400;
        }
        .kiosk-input:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.2);
        }
        .btn-checkin {
            width: 100%;
            padding: 22px;
            font-size: 22px;
            font-weight: 700;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 32px rgba(59,130,246,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .btn-checkin:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(59,130,246,0.45);
        }
        .btn-checkin:active { transform: scale(0.97); }
        .btn-walkin {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-walkin:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.35);
            color: #f1f5f9;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #475569;
            margin: 20px 0;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .kiosk-alert {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35);
            border-radius: 14px;
            color: #fca5a5;
            padding: 14px 20px;
            font-size: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .kiosk-footer {
            margin-top: 32px;
            color: #475569;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="kiosk-wrapper">
    <div class="kiosk-card">
        <div class="logo-icon"><i class="bi bi-hospital-fill"></i></div>
        <div class="kiosk-hospital-name">Benh vien HAMS</div>
        <h1 class="kiosk-title">Chào Mừng Bạn!</h1>
        <p class="kiosk-subtitle">Nhập Mã Lịch Hẹn Để Check-in Và Lấy Số Thứ Tự Khám</p>
        <div class="kiosk-alert" th:if="${errorMessage}">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <form th:action="@{/kiosk/check-in}" method="post">
            <input type="text" class="kiosk-input" name="phone"
                   placeholder="Nhap so dien thoai (VD: 098...)"
                   autocomplete="off" required>
            <button type="submit" class="btn-checkin">
                <i class="bi bi-qr-code-scan"></i>
                DA DAT LICH TRUOC - CHECK-IN
            </button>
        </form>
        <div class="kiosk-footer">
            <i class="bi bi-info-circle me-1"></i>
            Nếu Cần Hỗ Trợ Vui Lòng Đến Quầy Lễ Tân
        </div>
    </div>
</div>  
<script>
    function updateClock() {
        const now = new Date();
        document.getElementById("clock").textContent =
            now.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
