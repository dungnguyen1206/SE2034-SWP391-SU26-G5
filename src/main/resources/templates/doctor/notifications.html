<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo - Bác sĩ</title>
    <link rel="stylesheet" href="../../static/css/doctor/dashboard-doctor.css"
          th:href="@{/css/doctor/dashboard-doctor.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/notification-common.css}">
</head>
<body>
<div class="layout">
    <!-- Sidebar (giữ nguyên y hệt dashboard.html của Doctor) -->
    <aside class="sidebar">
        <div>
            <div class="brand">
                <h2>Hospital HAMS</h2>
                <p>Bác Sĩ</p>
            </div>
            <nav class="menu">
                <a th:href="@{/doctor/dashboard}">
                    <i class="fa-solid fa-table-cells-large"></i> Trang tổng quan
                </a>
                <a th:href="@{/doctor/schedule}">
                    <i class="fa-regular fa-calendar-days"></i> Lịch làm việc
                </a>
                <a th:href="@{/doctor/appointment-list}">
                    <i class="fa-regular fa-calendar-check"></i> Danh sách bệnh nhân
                </a>
                <!-- Đánh dấu active cho menu Thông báo -->
                <a th:href="@{/notifications/list}" class="active">
                    <i class="fa-regular fa-bell"></i> Thông báo
                    <!-- Badge số chưa đọc -->
                    <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                          th:text="${unreadNotificationCount}"
                          style="background:#ef4444;color:white;border-radius:50%;padding:1px 7px;font-size:11px;font-weight:bold;margin-left:4px;">
                    </span>
                </a>
            </nav>
        </div>
        <div class="doctor-box">
            <div class="doctor-info-box">
                <div class="doctor-avatar">
                    <img th:if="${doctorAvatar != null and doctorAvatar != ''}"
                         th:src="${#strings.replace(doctorAvatar, '/upload/', '/upload/w_150,h_150,c_fill,g_face,q_auto,f_auto/')}"
                         alt="Avatar"/>

                    <i th:unless="${doctorAvatar != null and doctorAvatar != ''}"
                       class="bi bi-person"></i>
                </div>
                <div>
                    <h4 th:text="${doctorName}">Bác sĩ</h4>
                    <p th:text="${doctorDept}"></p>
                </div>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div class="notif-wrap">
            <div class="notif-page-header">
                <h4><i class="fa-regular fa-bell" style="color:#2563eb;margin-right:8px;"></i> Thông báo của bạn</h4>
                <form th:action="@{/notifications/read-all}" method="post">
                    <button type="submit" class="btn-read-all">
                        <i class="fa-solid fa-check-double"></i> Đánh dấu tất cả đã đọc
                    </button>
                </form>
            </div>

            <!-- Rỗng -->
            <div th:if="${notifications == null or #lists.isEmpty(notifications)}" class="notif-empty">
                <i class="fa-regular fa-bell-slash"></i>
                <p>Bạn không có thông báo nào.</p>
            </div>

            <!-- Danh sách -->
            <div th:each="notif : ${notifications}"
                 class="notif-card"
                 th:classappend="${!notif.isRead} ? ' unread' : ''">

                <div class="notif-icon"
                     th:classappend="${notif.notificationType == 'SCHEDULE_ASSIGNED'} ? ' schedule' :
                                     (${notif.notificationType == 'APPOINTMENT_CANCELLED'} ? ' appointment' : ' default')">
                    <i th:class="${notif.notificationType == 'SCHEDULE_ASSIGNED'} ? 'fa-regular fa-calendar-check' :
                                 (${notif.notificationType == 'APPOINTMENT_CANCELLED'} ? 'fa-regular fa-calendar-xmark' : 'fa-solid fa-circle-info')"></i>
                </div>

                <div class="notif-body">
                    <p class="notif-title" th:text="${notif.title}">Tiêu đề</p>
                    <p class="notif-message" th:text="${notif.message}">Nội dung</p>
                    <div class="notif-time">
                        <i class="fa-regular fa-clock"></i>
                        <span th:text="${notif.timeAgo}">Vừa xong</span>
                    </div>
                </div>

                <div class="notif-actions">
                    <div th:if="${!notif.isRead}" class="notif-unread-dot"></div>
                    <form th:if="${!notif.isRead}" th:action="@{/notifications/{id}/read(id=${notif.id})}" method="post">
                        <button type="submit" class="btn-mark-read">
                            <i class="fa-solid fa-check"></i> Đã đọc
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
