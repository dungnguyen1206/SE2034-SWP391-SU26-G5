<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách bệnh nhân</title>

    <link rel="stylesheet" href="../../static/css/doctor/dashboard-doctor.css"
        th:href="@{/css/doctor/dashboard-doctor.css}">
    <link rel="stylesheet" href="../../static/css/doctor/schedule-doctor.css"
        th:href="@{/css/doctor/appointment-list.css}">
    <link rel="stylesheet" href="../../static/css/doctor/patient-detail.css"
        th:href="@{/css/doctor/patient-detail.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <div>
                <div class="brand">
                    <h2>Hospital HAMS</h2>
                    <p>Bác Sĩ</p>
                </div>

                <nav class="menu">
                    <a th:href="@{/doctor/dashboard}">
                        <i class="fa-solid fa-table-cells-large"></i>
                        Trang tổng quan
                    </a>

                    <a th:href="@{/doctor/schedule}">
                        <i class="fa-regular fa-calendar-days"></i>
                        Lịch làm việc
                    </a>

                    <a class="active" th:href="@{/doctor/appointment-list}">
                        <i class="fa-regular fa-calendar-check"></i>
                        Danh sách bệnh nhân
                    </a>

                    <a th:href="@{/notifications/list}">
                        <i class="fa-regular fa-bell"></i>
                        Thông báo
                        <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                              th:text="${unreadNotificationCount}"
                              style="background:#ef4444;color:white;border-radius:50%;padding:1px 7px;font-size:11px;font-weight:bold;margin-left:4px;">
                        </span>
                    </a>
                </nav>
            </div>

            <div class="doctor-box">
                <div class="doctor-info-box">
                    <div class="doctor-avatar">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div>
                        <h4 th:text="${doctorName}"></h4>
                        <p th:text="${doctorDept}"></p>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </form>
            </div>
        </aside>

        <main class="main patient-main">

            <div class="page-header">
                <div>
                    <h1>Danh sách bệnh nhân</h1>
                    <p th:text="${currentDate}"></p>
                </div>
                <div class="date-filter-box">
                    <form id="dateFilterForm" method="GET" th:action="@{/doctor/appointment-list}" style="display: flex; gap: 8px; align-items: center;">
                        <input type="hidden" name="status" th:value="${currentStatus}" />
                        <label for="dateFilter" class="date-filter-label">Chọn ngày khám:</label>
                        <input type="date" id="dateFilter" name="date" th:value="${selectedDate}"
                            class="date-picker-input" style="width: auto;" />
                        <button type="submit" style="padding: 8px 16px; background-color: #020617; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background-color 0.2s;">
                            Lọc
                        </button>
                    </form>
                </div>
            </div>

            <div class="filter-tabs">
                <a th:href="@{/doctor/appointment-list(status='ALL', date=${selectedDate})}"
                    th:classappend="${currentStatus == 'ALL'} ? 'active' : ''">
                    Tất cả (<span th:text="${countAll}"></span>)
                </a>
                <a th:href="@{/doctor/appointment-list(status='EXAMINING', date=${selectedDate})}"
                    th:classappend="${currentStatus == 'EXAMINING'} ? 'active' : ''">
                    Đang khám (<span th:text="${countExamining}"></span>)
                </a>
                <a th:href="@{/doctor/appointment-list(status='WAITING', date=${selectedDate})}"
                    th:classappend="${currentStatus == 'WAITING'} ? 'active' : ''">
                    Đang đợi (<span th:text="${countWaiting}"></span>)
                </a>
                <a th:href="@{/doctor/appointment-list(status='COMPLETED', date=${selectedDate})}"
                    th:classappend="${currentStatus == 'COMPLETED'} ? 'active' : ''">
                    Hoàn thành (<span th:text="${countCompleted}"></span>)
                </a>
            </div>

            <div class="patient-table">
                <table>
                    <thead>
                        <tr>
                            <th>BỆNH NHÂN</th>
                            <th>NGÀY HẸN</th>
                            <th>TRẠNG THÁI</th>
                            <th>THAO TÁC</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="a : ${appointments.content}">
                            <td>
                                <div class="patient-info">
                                    <div class="avatar" th:text="${a.patientInitials}">LT</div>
                                    <div>
                                        <h4 th:text="${a.patientFullName}"></h4>
                                        <p>
                                            ID: <span th:text="${'BN-' + a.patientId}"></span>
                                            • <span
                                                th:text="${a.patientAge != null ? a.patientAge + ' tuổi' : 'Chưa rõ tuổi'}"></span>
                                        </p>
                                    </div>
                                </div>
                            </td>

                            <td>
                                <strong th:text="${#temporals.format(a.bookingDate, 'dd/MM/yyyy')}"></strong>
                                <p class="time"
                                    th:text="${a.slotStartTime != null ? #temporals.format(a.slotStartTime, 'HH:mm') : ''}">
                                </p>
                            </td>

                            <td>
                                <form th:action="@{/doctor/appointments/{id}/status(id=${a.id})}" method="POST"
                                    style="display: flex; gap: 8px; align-items: center; justify-content: center;">
                                    <input type="hidden" name="currentStatus" th:value="${currentStatus}" />
                                    <input type="hidden" name="page" th:value="${currentPage}" />
                                    <input type="hidden" name="date" th:value="${selectedDate}" />
                                    <select name="status" class="status-select"
                                        th:classappend="${a.status == 'WAITING' ? 'waiting' : ((a.status == 'EXAMINING' or a.status == 'IN_PROGRESS') ? 'examining' : 'done')}"
                                        style="margin-bottom: 0;">
                                        <option value="WAITING" th:selected="${a.status == 'WAITING'}">Đang đợi</option>
                                        <option value="EXAMINING" th:selected="${a.status == 'EXAMINING' or a.status == 'IN_PROGRESS'}">Đang khám
                                        </option>
                                        <option value="COMPLETED" th:selected="${a.status == 'COMPLETED'}">Hoàn thành
                                        </option>
                                    </select>
                                    <button type="submit" class="btn-save-status"
                                        style="padding: 6px 12px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background-color 0.2s;">
                                        Lưu
                                    </button>
                                </form>
                            </td>

                            <td>
                                <a th:href="@{/doctor/appointments/{id}/detail(id=${a.id})}"
                                    class="detail-link btn-view-detail">
                                    <i class="fa-solid fa-pen"></i>
                                    Xem chi tiết
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="table-footer" th:if="${totalElements > 0}">
                    <p
                        th:text="'Hiển thị ' + ${startRow} + '-' + ${endRow} + ' trong tổng số ' + ${totalElements} + ' bệnh nhân'">
                    </p>

                    <div class="pagination" th:if="${totalPages > 1}">
                        <a th:href="@{/doctor/appointment-list(status=${currentStatus}, page=${currentPage - 1}, date=${selectedDate})}"
                           th:classappend="${currentPage == 0} ? 'disabled' : ''">‹ Trước</a>
                        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                           th:href="@{/doctor/appointment-list(status=${currentStatus}, page=${i}, date=${selectedDate})}"
                           th:classappend="${currentPage == i} ? 'active' : ''" th:text="${i + 1}">1</a>
                        <a th:href="@{/doctor/appointment-list(status=${currentStatus}, page=${currentPage + 1}, date=${selectedDate})}"
                           th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">Sau ›</a>
                    </div>
                </div>
                <div class="table-footer" th:if="${totalElements == 0}" style="justify-content: center;">
                    <p>Không tìm thấy bệnh nhân nào</p>
                </div>
            </div>

        </main>

    </div>

</body>

</html>
