<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Hồ sơ bệnh nhân - Hospital HAMS</title>

    <link rel="stylesheet" href="../../static/css/doctor/dashboard-doctor.css"
        th:href="@{/css/doctor/dashboard-doctor.css}">
    <link rel="stylesheet" href="../../static/css/doctor/patient-detail.css"
        th:href="@{/css/doctor/patient-detail.css}">
    <link rel="stylesheet" href="../../static/css/doctor/create-record.css" th:href="@{/css/doctor/create-record.css}">
    <link rel="stylesheet" href="../../static/css/doctor/edit-record.css" th:href="@{/css/doctor/edit-record.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside th:replace="~{doctor/fragments/sidebar :: sidebar('appointments')}"></aside>

        <!-- Main Content -->
        <main class="main patient-detail-main">

            <!-- Header with Back Button -->
            <div class="detail-header-row">
                <a th:href="@{/doctor/appointment-list}" class="btn-back" title="Quay lại danh sách">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="detail-title-area">
                    <h1>Hồ sơ bệnh nhân</h1>
                    <p>Xem và quản lý thông tin chi tiết của bệnh nhân</p>
                </div>
            </div>

            <!-- Alert Messages -->
            <div th:if="${errorMessage}"
                style="margin: 20px 0; padding: 15px; background-color: #fee2e2; color: #b91c1c; border-radius: 8px; border-left: 4px solid #ef4444; font-weight: 500;">
                <i class="fa-solid fa-circle-exclamation" style="margin-right: 8px;"></i>
                <span th:text="${errorMessage}"></span>
            </div>
            <div th:if="${successMessage}"
                style="margin: 20px 0; padding: 15px; background-color: #d1fae5; color: #065f46; border-radius: 8px; border-left: 4px solid #10b981; font-weight: 500;">
                <i class="fa-solid fa-circle-check" style="margin-right: 8px;"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <!-- Client-side Alert Message (hidden by default) -->
            <div id="clientAlert"
                style="display: none; margin: 20px 0; padding: 15px; background-color: #fee2e2; color: #b91c1c; border-radius: 8px; border-left: 4px solid #ef4444; font-weight: 500;">
                <i class="fa-solid fa-circle-exclamation" style="margin-right: 8px;"></i>
                <span id="clientAlertMessage"></span>
            </div>

            <!-- Patient Summary Card -->
            <div class="patient-summary-card">
                <div class="summary-avatar" th:text="${appointment.patientInitials}">LT</div>
                <div class="summary-info">
                    <div class="summary-name-row">
                        <h2 th:text="${appointment.patientFullName}">Lê Thị Mai Anh</h2>
                        <div class="summary-badges">
                            <span class="code-badge" th:text="${'BN-' + appointment.patientId}">BN-30241</span>
                            <span class="status-badge"
                                th:classappend="${appointment.status == 'WAITING' ? 'waiting' : ((appointment.status == 'EXAMINING' or appointment.status == 'IN_PROGRESS') ? 'examining' : 'done')}"
                                th:text="${appointment.status == 'WAITING' ? 'Đang đợi' : ((appointment.status == 'EXAMINING' or appointment.status == 'IN_PROGRESS') ? 'Đang khám' : (appointment.status == 'COMPLETED' ? 'Hoàn thành' : (appointment.status == 'NO_SHOW' ? 'Vắng mặt' : appointment.status)))}">Đang
                                khám</span>
                        </div>
                    </div>
                    <p class="summary-meta"
                        th:text="${(appointment.patientAge != null ? appointment.patientAge + ' tuổi' : 'Chưa rõ tuổi') + ' • ' + appointment.serviceName}">
                        45 tuổi • Tái khám định kỳ</p>
                </div>
            </div>

            <!-- Tabs Section -->
            <div class="detail-tabs">
                <a th:href="@{/doctor/appointments/{id}/detail(id=${appointment.id}, tab='info')}"
                    th:class="${tab == 'info' || tab == null ? 'active' : ''}">Thông tin cá nhân</a>
                <a th:href="@{/doctor/appointments/{id}/detail(id=${appointment.id}, tab='services')}"
                    th:class="${tab == 'services' ? 'active' : ''}">Dịch vụ khám</a>
            </div>

            <!-- Tab Content Pane Container -->
            <div class="tab-content">

                <!-- Tab Pane 1: Thông tin cá nhân & Bệnh án -->
                <div th:replace="~{doctor/fragments/patient-info-tab :: info-tab}"></div>

                <!-- Tab Pane 2: Dịch vụ khám -->
                <div th:replace="~{doctor/fragments/services-tab :: services-tab}"></div>

            </div>

        </main>

    </div>

    <!-- Modals & Scripts -->
    <div th:replace="~{doctor/fragments/modals :: modals}"></div>

</body>

</html>
