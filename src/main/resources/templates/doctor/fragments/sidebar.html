<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

    <!-- Doctor Sidebar Fragment -->
    <aside th:fragment="sidebar(activePage)" class="sidebar">
        <div>
            <a th:href="@{/}" class="brand" style="text-decoration: none; color: inherit; display: block; cursor: pointer;">
                <h2>Hospital HAMS</h2>
                <p>Bác Sĩ</p>
            </a>

            <nav class="menu">
                <a th:href="@{/doctor/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <i class="fa-solid fa-table-cells-large"></i>
                    Trang tổng quan
                </a>

                <a th:href="@{/doctor/schedule}" th:classappend="${activePage == 'schedule'} ? 'active' : ''">
                    <i class="fa-regular fa-calendar-days"></i>
                    Lịch làm việc
                </a>

                <a th:href="@{/doctor/appointment-list}" th:classappend="${activePage == 'appointments'} ? 'active' : ''">
                    <i class="fa-regular fa-calendar-check"></i>
                    Danh sách bệnh nhân
                </a>

                <a th:href="@{/notifications/list}" th:classappend="${activePage == 'notifications'} ? 'active' : ''">
                    <i class="fa-regular fa-bell"></i>
                    Thông báo
                    <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                          th:text="${unreadNotificationCount}"
                          style="background:#ef4444;color:white;border-radius:50%;padding:1px 7px;font-size:11px;font-weight:bold;margin-left:4px;">
                    </span>
                </a>
            </nav>
        </div>

        <div class="doctor-box">
            <div class="doctor-info-box">
                <div class="doctor-avatar">
                    <img th:if="${doctorAvatar != null and doctorAvatar != ''}"
                         th:src="${#strings.replace(doctorAvatar, '/upload/', '/upload/w_150,h_150,c_fill,g_face,q_auto,f_auto/')}"
                         alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;"/>
                    <i th:unless="${doctorAvatar != null and doctorAvatar != ''}"
                       class="fa-regular fa-user"></i>
                </div>
                <div>
                    <h4 th:text="${doctorName}"></h4>
                    <p th:text="${doctorDept}"></p>
                </div>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </form>
        </div>
    </aside>

</body>
</html>
