<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

    <!-- Tab Pane 2: Dịch vụ khám -->
    <div th:fragment="services-tab" class="tab-pane" th:classappend="${tab == 'services' ? 'active' : ''}">
        <!-- Clinical / Lab Services Prescribed -->
        <div class="detail-content-card">
            <div class="card-header-row">
                <h3 class="card-title-flex">
                    <i class="fa-solid fa-vials text-purple"></i> Dịch vụ khám
                </h3>
                <a th:if="${medicalRecord != null and appointment.status != 'COMPLETED'}"
                   th:href="@{/doctor/appointments/{id}/detail(id=${appointment.id}, tab='services', action='selectServices')}"
                   class="btn-create-record btn-primary-blue">
                    <i class="fa-solid fa-plus"></i> Chọn dịch vụ khám
                </a>
                <button th:if="${medicalRecord == null and appointment.status != 'COMPLETED'}"
                        onclick="alert('Vui lòng tạo hồ sơ bệnh án trước khi chọn dịch vụ khám!')"
                        class="btn-create-record btn-disabled-gray">
                    <i class="fa-solid fa-plus"></i> Chọn dịch vụ khám
                </button>
            </div>
            <hr class="card-divider">

            <!-- Empty State if no medical record or no service orders -->
            <div th:if="${medicalRecord == null or #lists.isEmpty(medicalRecord.medicalServiceOrders)}"
                 class="empty-record-state">
                <i class="fa-solid fa-laptop-medical"></i>
                <p>Không có dịch vụ khám nào được chỉ định cho lịch hẹn này.</p>
            </div>

            <!-- Table of clinical service orders if present -->
            <div th:if="${medicalRecord != null and not #lists.isEmpty(medicalRecord.medicalServiceOrders)}"
                 class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th class="w-60">STT</th>
                            <th>Tên dịch vụ khám</th>
                            <th class="w-120">Giá tiền</th>
                            <th class="w-150">Trạng thái</th>
                            <th>Ghi chú / Chỉ định</th>
                            <th>Kết quả</th>
                            <th class="w-130">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order, iter : ${medicalRecord.medicalServiceOrders}">
                            <td class="font-medium" th:text="${iter.count}">1</td>
                            <td class="font-semibold text-slate-900" th:text="${order.medicalService.name}">Xét nghiệm máu</td>
                            <td class="font-semibold text-green-600"
                                th:text="${order.priceReference != null ? #numbers.formatDecimal(order.priceReference, 0, 'COMMA', 0, 'POINT') + ' đ' : '-'}">300.000 đ</td>
                            <td>
                                <span th:if="${order.status == 'PENDING_PAYMENT'}"
                                      class="badge-payment-pending">Chờ thanh toán</span>
                                <span th:if="${order.status == 'PENDING' or order.status == 'PAID'}"
                                      class="badge-pending">Chờ thực hiện</span>
                                <span th:if="${order.status == 'COMPLETED'}"
                                      class="badge-completed">Đã hoàn thành</span>
                                <span th:if="${order.status == 'CANCELLED'}"
                                      class="badge-cancelled">Đã hủy</span>
                                <span th:if="${order.status != 'PENDING_PAYMENT' and order.status != 'PENDING' and order.status != 'PAID' and order.status != 'COMPLETED' and order.status != 'CANCELLED'}"
                                      class="badge-cancelled"
                                      th:text="${order.status}">Khác</span>
                            </td>
                            <td class="text-slate-500"
                                th:text="${order.note != null and !order.note.isEmpty() ? order.note : '-'}">-</td>
                            <td class="font-medium"
                                th:text="${order.result != null and !order.result.isEmpty() ? order.result : (order.status == 'COMPLETED' ? 'Đã có kết quả' : 'Chưa có kết quả')}">-</td>
                            <td>
                                <span th:if="${appointment.status == 'COMPLETED'}"
                                      class="action-locked-badge">
                                    <i class="fa-solid fa-lock"></i> Đã khóa (Hoàn thành)
                                </span>
                                <div th:if="${appointment.status != 'COMPLETED' and order.status == 'PENDING_PAYMENT'}"
                                     class="action-unpaid-group">
                                    <span class="action-unpaid-badge" title="Chưa thanh toán">
                                        <i class="fa-solid fa-lock"></i>
                                    </span>
                                    <form th:action="@{/doctor/appointments/{id}/services/{orderId}/delete(id=${appointment.id}, orderId=${order.id})}"
                                          method="POST" class="inline-block"
                                          th:onsubmit="return confirm('Bạn có chắc chắn muốn xóa dịch vụ \'' + [[${order.medicalService.name}]] + '\' không?');">
                                        <button type="submit" class="btn-delete-service"
                                                title="Xóa dịch vụ">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                                <span th:if="${appointment.status != 'COMPLETED' and order.status == 'CANCELLED'}"
                                      class="action-cancelled-badge">
                                    <i class="fa-solid fa-ban"></i> Đã hủy
                                </span>
                                <button type="button"
                                        th:if="${appointment.status != 'COMPLETED' and order.status != 'PENDING_PAYMENT' and order.status != 'CANCELLED'}"
                                        th:onclick="openEditResultModal([[${order.id}]], [[${order.medicalService.name}]], [[${order.result != null ? order.result : ''}]], [[${order.note != null ? order.note : ''}]])"
                                        class="btn-create-record btn-input-result">
                                    <i class="fa-solid fa-pen-to-square"></i> Nhập KQ
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
