<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lịch làm việc</title>

    <link rel="stylesheet" href="../../static/css/doctor/dashboard-doctor.css"
        th:href="@{/css/doctor/dashboard-doctor.css}">
    <link rel="stylesheet" href="../../static/css/doctor/schedule-doctor.css"
        th:href="@{/css/doctor/schedule-doctor.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside th:replace="~{doctor/fragments/sidebar :: sidebar('schedule')}"></aside>

        <main class="main schedule-main">

            <div class="schedule-header">
                <div>
                    <h1>Lịch làm việc hằng tuần</h1>
                    <p>Chào mừng trở lại, Bác sĩ <span th:text="${doctorName}"></span>. Chúc bạn 1 ngày làm việc tốt
                        lành.</p>
                </div>

                <div class="week-control">
                    <a th:href="@{/doctor/schedule(date=${prevWeekDate})}"
                        style="text-decoration: none; color: inherit; display: flex; align-items: center;"><button><i
                                class="fa-solid fa-chevron-left"></i></button></a>
                    <a th:href="@{/doctor/schedule(date=${prevWeekDate})}"
                        style="text-decoration: none; color: inherit;"><b>Tuần trước</b></a>
                    <span>|</span>
                    <a th:href="@{/doctor/schedule(date=${nextWeekDate})}"
                        style="text-decoration: none; color: inherit;"><b>Tuần tiếp theo</b></a>
                    <a th:href="@{/doctor/schedule(date=${nextWeekDate})}"
                        style="text-decoration: none; color: inherit; display: flex; align-items: center;"><button><i
                                class="fa-solid fa-chevron-right"></i></button></a>
                </div>
            </div>

            <div class="timetable-container">
                <section class="week-grid">
                    <div class="day" th:each="day : ${weekSchedule}">
                        <div class="day-header">
                            <p th:text="${day.dayOfWeekLabel}">THỨ 2</p>
                            <h2 th:text="${day.dayAndMonth}">15/06</h2>
                        </div>

                        <div class="day-body">
                            <!-- Empty day -->
                            <div th:if="${#lists.isEmpty(day.shifts)}" class="day-empty">
                                <i class="fa-regular fa-calendar"></i>
                            </div>

                            <!-- Day with shifts -->
                            <div th:unless="${#lists.isEmpty(day.shifts)}" class="shift-wrapper">
                                <div th:each="shift : ${day.shifts}" class="shift" th:classappend="${shift.shiftClass}">
                                    <h3 th:text="${shift.title}"></h3>
                                    <p th:text="${shift.timeRange}"></p>
                                    <small th:text="${shift.roomName}"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <section class="summary-grid">
                <div class="summary-card">
                    <div class="summary-icon blue-icon">
                        <i class="fa-regular fa-clock"></i>
                    </div>
                    <div>
                        <p>TỔNG GIỜ LÀM VIỆC</p>
                        <h2 th:text="${totalHoursStr} + ' Giờ'"></h2>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-icon green-icon">
                        <i class="fa-regular fa-clipboard"></i>
                    </div>
                    <div>
                        <p>SỐ CA LÀM VIỆC</p>
                        <h2 th:text="${shiftCountStr} + ' Ca'"></h2>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-icon orange-icon">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                    </div>
                    <div>
                        <p>HIỆU SUẤT TUẦN</p>
                        <h2 th:text="${performance}"></h2>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>

</html>
