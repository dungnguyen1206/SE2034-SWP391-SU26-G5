<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yêu cầu không hợp lệ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border: 1px solid #dde3ea; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 420px; box-shadow: 0 4px 24px rgba(15,23,42,0.08); }
        .icon { font-size: 56px; color: #ef4444; margin-bottom: 16px; }
        h2 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
        p  { font-size: 14px; color: #64748b; margin-bottom: 24px; }
        a  { display: inline-flex; align-items: center; gap: 8px; background: #0f4c81; color: #fff; border-radius: 9px; padding: 10px 20px; font-size: 14px; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="bi bi-exclamation-triangle"></i></div>
    <h2>400 — Yêu cầu không hợp lệ</h2>
    <p th:text="${errorMessage} ?: 'Yêu cầu của bạn không hợp lệ.'"></p>
    <a th:href="@{/patient/dashboard}"><i class="bi bi-house"></i> Về trang chủ</a>
</div>
</body>
</html>
