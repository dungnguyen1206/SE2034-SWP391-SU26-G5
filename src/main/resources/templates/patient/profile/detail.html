<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-profile.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="patient-layout">
        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('profile')}"></div>
        <main class="patient-main">

            <div th:if="${successMessage}" class="alert alert-success">
                <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
            </div>

            <div class="patient-page-header">
                <div>
                    <h2>Hồ sơ cá nhân</h2>
                    <p>Thông tin tài khoản và hồ sơ bệnh nhân</p>
                </div>
                <a th:href="@{/patient/profile/edit}" class="btn-primary">
                    <i class="bi bi-pencil"></i> Chỉnh sửa
                </a>
            </div>

            <div class="profile-layout">
                <!-- LEFT: Avatar card -->
                <div>
                    <div class="profile-avatar-card">
                        <div class="profile-avatar">
                            <img th:src="${profile.getAvatar()}" alt="avatar"></img>
                        </div>
                        <div class="profile-name" th:text="${profile.fullName}">Nguyễn Văn A</div>
                        <div class="profile-username" th:text="'@' + ${profile.username}">@username</div>
                        <div class="profile-status-badge">
                            <span class="profile-status-dot"></span>
                            Tài khoản hoạt động
                        </div>
                        <div class="profile-quick-info">
                            <div class="profile-quick-row" th:if="${profile.phone != null}">
                                <i class="bi bi-telephone"></i>
                                <span th:text="${profile.phone}"></span>
                            </div>
                            <div class="profile-quick-row">
                                <i class="bi bi-envelope"></i>
                                <span th:text="${profile.email}"></span>
                            </div>
                            <div class="profile-quick-row" th:if="${profile.addressLine != null}">
                                <i class="bi bi-geo-alt"></i>
                                <span th:text="${profile.addressLine}"></span>
                            </div>
                            <div class="profile-quick-row" th:if="${profile.provinceName != null}">
                                <i class="bi bi-map"></i>
                                <span th:text="${profile.provinceName}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Info sections -->
                <div style="display:flex;flex-direction:column;gap:16px;">
                    <div class="patient-card">
                        <div class="patient-card-header">
                            <i class="bi bi-person"></i>
                            <h3>Thông tin cá nhân</h3>
                        </div>
                        <div class="profile-info-grid">
                            <div class="profile-info-row">
                                <span class="profile-info-label">Họ</span>
                                <span class="profile-info-value" th:classappend="${profile.lastName == null} ? ' empty'"
                                    th:text="${profile.lastName != null} ? ${profile.lastName} : 'Chưa cập nhật'"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Tên</span>
                                <span class="profile-info-value" th:text="${profile.firstName}"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Giới tính</span>
                                <span class="profile-info-value" th:text="${profile.gender == 'MALE'} ? 'Nam' :
                                           (${profile.gender == 'FEMALE'} ? 'Nữ' :
                                           (${profile.gender != null} ? ${profile.gender} : 'Chưa cập nhật'))"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Ngày sinh</span>
                                <span class="profile-info-value"
                                    th:text="${profile.dateOfBirth != null} ? ${#temporals.format(profile.dateOfBirth, 'dd/MM/yyyy')} : 'Chưa cập nhật'"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Nhóm máu</span>
                                <span class="profile-info-value"
                                    th:text="${profile.bloodType != null} ? ${profile.bloodType} : 'Chưa cập nhật'"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Số điện thoại</span>
                                <span class="profile-info-value"
                                    th:text="${profile.phone != null} ? ${profile.phone} : 'Chưa cập nhật'"></span>
                            </div>
                        </div>
                    </div>

                    <div class="patient-card">
                        <div class="patient-card-header">
                            <i class="bi bi-shield-check"></i>
                            <h3>Thông tin tài khoản</h3>
                        </div>
                        <div class="profile-info-grid">
                            <div class="profile-info-row">
                                <span class="profile-info-label">Tên đăng nhập</span>
                                <span class="profile-info-value" th:text="${profile.username}"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Email</span>
                                <span class="profile-info-value" th:text="${profile.email}"></span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Ngày tham gia</span>
                                <span class="profile-info-value"
                                    th:text="${profile.createdAt != null} ? ${#temporals.format(profile.createdAt, 'dd/MM/yyyy')} : ''"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</body>

</html>
