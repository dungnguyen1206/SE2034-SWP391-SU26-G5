<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa hồ sơ</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-profile.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            flex: 1;
        }

        .modal-close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #94a3b8;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .modal-close-btn:hover {
            background: #f1f5f9;
            color: #475569;
        }

        .modal-body {
            padding: 24px;
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
        }

        .modal-footer {
            padding: 16px 24px;
            background: #f8fafc;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>

<body>
<div class="patient-layout">
    <div th:replace="~{patient/fragments/sidebar :: patientSidebar('profile')}"></div>

    <!-- PATIENT PROFILE EDIT - Page content -->
    <main class="patient-main">

        <!-- PATIENT PROFILE EDIT - Flash error -->
        <div th:if="${errorMessage}" class="alert alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- PATIENT PROFILE EDIT - Header -->
        <div class="patient-page-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a th:href="@{/patient/profile}" class="patient-back-link">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h2>Chỉnh sửa hồ sơ</h2>
                    <p>Cập nhật thông tin cá nhân của bạn</p>
                </div>
            </div>
        </div>


        <!-- PATIENT PROFILE EDIT - Self-update form, current user is resolved in controller -->
        <form th:action="@{/patient/profile/edit}" method="post" th:object="${updateUserForm}" enctype="multipart/form-data" id="profileForm">
            <div style="display:flex;flex-direction:column;gap:16px;">

                <div th:replace="~{fragments/user-update-form :: metaFields}">
                </div>

                <div style="display:flex;align-items:center;gap:12px;">
                    <!-- PATIENT PROFILE EDIT - Common fields from users table -->
                    <section class="patient-card">
                        <div class="patient-card-header">
                            <i class="bi bi-person"></i>
                            <h3>Thông tin cá nhân</h3>
                        </div>
                        <div class="profile-form-grid">
                            <div th:replace="~{fragments/user-update-form :: commonFields('PATIENT')}"></div>
                            <div th:replace="~{fragments/user-update-form :: patientFields}"></div>
                        </div>
                    </section>

                    <!-- Patient UPDATE - Avatar upload placeholder -->
                    <section class="patient-avatar">
                        <div class="patient-card-header">Ảnh đại diện</div>
                        <div class="patient-photo-preview" id="patient-photo-preview">
                            <img th:if="${updateUserForm.avatar != null and updateUserForm.avatar != ''}"
                                 th:src="${updateUserForm.avatar}"
                                 alt="Avatar"/>

                            <i th:unless="${updateUserForm.avatar != null and updateUserForm.avatar != ''}"
                               class="bi bi-person"></i>
                        </div>
                        <input id="PatientAvatarFile" class="patient-file-input" type="file" name="avatarFile"
                               accept="image/*">
                        <label for="PatientAvatarFile" class="patient-upload-button">Tải ảnh lên</label>

                        <!-- PATIENT PROFILE EDIT - Actions -->
                        <div class="profile-form-actions">
                            <button type="button" class="btn-primary" onclick="showConfirmModal()">
                                <i class="bi bi-check-lg"></i> Lưu thay đổi
                            </button>
                            <a th:href="@{/patient/profile}" class="btn-secondary">
                                <i class="bi bi-x"></i> Hủy
                            </a>
                        </div>
                    </section>

                </div>

            </div>
        </form>

    </main>
</div>

<!-- Confirmation Modal -->
<div id="confirmModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <i class="bi bi-question-circle-fill" style="color: #0f4c81; font-size: 24px;"></i>
            <h3>Xác nhận thay đổi</h3>
            <button type="button" class="modal-close-btn" onclick="closeConfirmModal()">&times;</button>
        </div>
        <div class="modal-body">
            Bạn có chắc chắn muốn lưu các thay đổi đối với thông tin cá nhân của mình không?
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-secondary" style="border: 1px solid #cbd5e1; background: #fff; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #475569;" onclick="closeConfirmModal()">Hủy bỏ</button>
            <button type="button" class="btn-primary" style="padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; background: #0f4c81; color: #fff; border: none;" onclick="submitForm()">Đồng ý</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const patientImageBlock = document.getElementById("patient-photo-preview");
    const patientAvatar = document.getElementById("PatientAvatarFile");

    patientAvatar.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            patientImageBlock.innerHTML = "";
            const newAvatar = document.createElement("img");
            newAvatar.src = url;
            newAvatar.alt = "Avatar";
            patientImageBlock.appendChild(newAvatar);
        }
    });

    function showConfirmModal() {
        document.getElementById('confirmModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeConfirmModal() {
        document.getElementById('confirmModal').style.display = 'none';
        document.body.style.overflow = '';
    }

    function submitForm() {
        document.getElementById('confirmModal').style.display = 'none';
        document.body.style.overflow = '';
        document.getElementById('profileForm').submit();
    }

    // Đóng modal khi click bên ngoài
    document.getElementById('confirmModal').addEventListener('click', function(e) {
        if (e.target === this) closeConfirmModal();
    });
</script>
</body>

</html>
