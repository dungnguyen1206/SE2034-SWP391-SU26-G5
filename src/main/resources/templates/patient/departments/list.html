<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên khoa - HAMS</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .guest-navbar {
            position: sticky; top: 0; z-index: 100;
            background: #fff; border-bottom: 1px solid #e2e8f0;
            padding: 0 48px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
        }
        .guest-brand { display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:#0f4c81;text-decoration:none; }
        .guest-brand i { font-size:26px;color:#2563eb; }
        .guest-nav { display:flex;gap:32px;list-style:none; }
        .guest-nav a { color:#475569;text-decoration:none;font-size:14px;font-weight:500; }
        .guest-nav a.active { color:#2563eb;font-weight:700; }
        .guest-actions { display:flex;gap:10px; }
        .btn-go { padding:8px 18px;border:1.5px solid #2563eb;border-radius:8px;color:#2563eb;font-size:14px;font-weight:600;text-decoration:none; }
        .btn-gf { padding:8px 18px;background:#2563eb;border-radius:8px;color:#fff;font-size:14px;font-weight:600;text-decoration:none; }
    </style>
</head>
<body>

<!-- ── ĐÃ ĐĂNG NHẬP: layout với sidebar ── -->
<div sec:authorize="isAuthenticated()" class="patient-layout">
    <div th:replace="~{patient/fragments/sidebar :: patientSidebar('departments')}"></div>
    <main class="patient-main">
        <div class="patient-page-header">
            <div>
                <h2>Chuyên khoa</h2>
                <p>Xem thông tin các khoa và bác sĩ tương ứng</p>
            </div>
            <a th:href="@{/patient/appointments/book}" class="btn-primary">
                <i class="bi bi-calendar-plus"></i> Đặt lịch khám
            </a>
        </div>

        <div th:if="${#lists.isEmpty(departments)}" class="patient-card">
            <div class="empty-state">
                <i class="bi bi-building-x" style="font-size:40px;"></i>
                <p>Chưa có khoa nào</p>
            </div>
        </div>

        <div th:unless="${#lists.isEmpty(departments)}"
             style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
            <div th:each="dept : ${departments}" class="patient-card"
                 style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
                <div th:if="${dept.imageUrl != null}" style="height:140px;overflow:hidden;">
                    <img th:src="${dept.imageUrl}" alt="dept" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <div th:if="${dept.imageUrl == null}"
                     style="height:140px;background:linear-gradient(135deg,#eff6ff,#dbeafe);
                            display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-hospital" style="font-size:48px;color:#3b82f6;opacity:0.5;"></i>
                </div>
                <div style="padding:16px;flex:1;display:flex;flex-direction:column;gap:8px;">
                    <div style="font-size:15px;font-weight:700;color:#0f172a;" th:text="${dept.name}"></div>
                    <div th:if="${dept.description != null}"
                         style="font-size:13px;color:#64748b;line-height:1.5;
                                display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"
                         th:text="${dept.description}"></div>
                    <div style="margin-top:auto;display:flex;gap:8px;">
                        <a th:href="@{/patient/departments/{id}(id=${dept.id})}"
                           class="btn-secondary" style="flex:1;justify-content:center;font-size:13px;">
                            <i class="bi bi-info-circle"></i> Chi tiết
                        </a>
                        <a th:href="@{/patient/appointments/book/step2(departmentId=${dept.id})}"
                           class="btn-primary" style="flex:1;justify-content:center;font-size:13px;">
                            <i class="bi bi-calendar-plus"></i> Đặt lịch
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div style="margin-top:12px;font-size:13px;color:#94a3b8;" th:unless="${#lists.isEmpty(departments)}"
             th:text="${#lists.size(departments)} + ' chuyên khoa'"></div>
    </main>
</div>

<!-- ── CHƯA ĐĂNG NHẬP: navbar guest ── -->
<div sec:authorize="!isAuthenticated()">
    <nav class="guest-navbar">
        <a href="/home" class="guest-brand"><i class="bi bi-hospital"></i> HAMS</a>
        <ul class="guest-nav">
            <li><a href="/home">Trang chủ</a></li>
            <li><a href="/patient/departments" class="active">Chuyên khoa</a></li>
        </ul>
        <div class="guest-actions">
            <a href="/login" class="btn-go">Đăng nhập</a>
            <a href="/register" class="btn-gf">Đăng ký</a>
        </div>
    </nav>

    <div style="max-width:1100px;margin:0 auto;padding:32px 48px 64px;">
        <div style="margin-bottom:24px;">
            <h2 style="font-size:24px;font-weight:800;color:#0f172a;">Chuyên khoa</h2>
            <p style="font-size:14px;color:#64748b;margin-top:4px;">Xem thông tin các khoa và đội ngũ bác sĩ</p>
        </div>

        <div th:if="${#lists.isEmpty(departments)}"
             style="background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:56px;text-align:center;color:#94a3b8;">
            <i class="bi bi-building-x" style="font-size:40px;display:block;margin-bottom:12px;"></i>
            <p>Chưa có chuyên khoa nào</p>
        </div>

        <div th:unless="${#lists.isEmpty(departments)}"
             style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;">
            <div th:each="dept : ${departments}"
                 style="background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;
                        display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.04);">
                <div th:if="${dept.imageUrl != null}" style="height:140px;overflow:hidden;">
                    <img th:src="${dept.imageUrl}" th:alt="${dept.name}" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <div th:if="${dept.imageUrl == null}"
                     style="height:140px;background:linear-gradient(135deg,#eff6ff,#dbeafe);
                            display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-hospital" style="font-size:52px;color:#3b82f6;opacity:.4;"></i>
                </div>
                <div style="padding:18px;flex:1;display:flex;flex-direction:column;gap:8px;">
                    <div style="font-size:15px;font-weight:700;color:#0f172a;" th:text="${dept.name}"></div>
                    <div th:if="${dept.description != null}"
                         style="font-size:13px;color:#64748b;line-height:1.5;
                                display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                         th:text="${dept.description}"></div>
                    <div style="display:flex;gap:8px;margin-top:auto;padding-top:10px;">
                        <a th:href="@{/patient/departments/{id}(id=${dept.id})}"
                           style="flex:1;padding:9px 8px;text-align:center;border-radius:8px;
                                  border:1.5px solid #e2e8f0;color:#475569;font-size:13px;font-weight:600;
                                  text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;">
                            <i class="bi bi-info-circle"></i> Chi tiết
                        </a>
                        <a th:href="@{/patient/appointments/book/step2(departmentId=${dept.id})}"
                           style="flex:1;padding:9px 8px;text-align:center;border-radius:8px;
                                  background:#2563eb;color:#fff;font-size:13px;font-weight:600;
                                  text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;">
                            <i class="bi bi-calendar-plus"></i> Đặt lịch
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
