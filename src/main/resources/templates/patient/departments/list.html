<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chuyên khoa</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="patient-layout">
        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('departments')}"></div>
        <main class="patient-main">

            <div class="patient-page-header">
                <div>
                    <h2>Chuyên khoa</h2>
                    <p>Xem thông tin các khoa và bác sĩ tương ứng</p>
                </div>
                <a th:href="@{/patient/appointments/book}" class="btn-primary">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch khám
                </a>
            </div>

            <div th:if="${#lists.isEmpty(departments)}" class="patient-card">
                <div class="empty-state">
                    <i class="bi bi-building-x" style="font-size:40px;"></i>
                    <p>Chưa có khoa nào</p>
                </div>
            </div>

            <!-- Department grid -->
            <div th:unless="${#lists.isEmpty(departments)}"
                style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
                <div th:each="dept : ${departments}" class="patient-card"
                    style="padding:0;overflow:hidden;display:flex;flex-direction:column;">

                    <!-- Image hoặc placeholder -->
                    <div th:if="${dept.imageUrl != null}" style="height:140px;overflow:hidden;">
                        <img th:src="${dept.imageUrl}" alt="dept" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                    <div th:if="${dept.imageUrl == null}" style="height:140px;background:linear-gradient(135deg,#eff6ff,#dbeafe);
                            display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-hospital" style="font-size:48px;color:#3b82f6;opacity:0.5;"></i>
                    </div>

                    <div style="padding:16px;flex:1;display:flex;flex-direction:column;gap:8px;">
                        <div style="font-size:15px;font-weight:700;color:#0f172a;" th:text="${dept.name}"></div>
                        <div th:if="${dept.description != null}" style="font-size:13px;color:#64748b;line-height:1.5;
                                display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"
                            th:text="${dept.description}"></div>
                        <div style="margin-top:auto;display:flex;gap:8px;">
                            <a th:href="@{/patient/departments/{id}(id=${dept.id})}" class="btn-secondary"
                                style="flex:1;justify-content:center;font-size:13px;">
                                <i class="bi bi-info-circle"></i> Chi tiết
                            </a>
                            <a th:href="@{/patient/appointments/book/step2(departmentId=${dept.id})}"
                                class="btn-primary" style="flex:1;justify-content:center;font-size:13px;">
                                <i class="bi bi-calendar-plus"></i> Đặt lịch
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top:12px;font-size:13px;color:#94a3b8;" th:unless="${#lists.isEmpty(departments)}"
                th:text="${#lists.size(departments)} + ' chuyên khoa'"></div>

        </main>
    </div>
</body>

</html>
