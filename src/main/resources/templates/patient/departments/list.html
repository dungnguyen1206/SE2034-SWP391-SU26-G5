<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên khoa - HAMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; color: #1e293b; background: #f8fafc; }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: #fff; border-bottom: 1px solid #e2e8f0;
            padding: 0 48px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 22px; font-weight: 800; color: #0f4c81; text-decoration: none;
        }
        .navbar-brand i { font-size: 26px; color: #2563eb; }
        .navbar-nav { display: flex; gap: 32px; list-style: none; }
        .navbar-nav a { color: #475569; text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
        .navbar-nav a:hover { color: #2563eb; }
        .navbar-nav a.active { color: #2563eb; font-weight: 700; }
        .navbar-actions { display: flex; gap: 10px; }
        .btn-nav-outline {
            padding: 8px 18px; border: 1.5px solid #2563eb; border-radius: 8px;
            color: #2563eb; font-size: 14px; font-weight: 600; text-decoration: none;
        }
        .btn-nav-outline:hover { background: #eff6ff; }
        .btn-nav-filled {
            padding: 8px 18px; background: #2563eb; border-radius: 8px;
            color: #fff; font-size: 14px; font-weight: 600; text-decoration: none;
        }
        .btn-nav-filled:hover { background: #1d4ed8; }

        .breadcrumb-bar {
            background: #fff; border-bottom: 1px solid #f1f5f9;
            padding: 12px 48px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #64748b;
        }
        .breadcrumb-bar a { color: #2563eb; text-decoration: none; }
        .breadcrumb-bar i { font-size: 11px; }

        .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 32px 48px 64px; }

        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
        }
        .page-title { font-size: 24px; font-weight: 800; color: #0f172a; }
        .page-subtitle { font-size: 14px; color: #64748b; margin-top: 4px; }

        .dept-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
        }
        .dept-card {
            background: #fff; border-radius: 14px; border: 1px solid #e2e8f0;
            overflow: hidden; transition: all .25s; display: flex; flex-direction: column;
            box-shadow: 0 1px 4px rgba(0,0,0,.04);
        }
        .dept-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(37,99,235,.12); border-color: #bfdbfe; }
        .dept-img {
            height: 140px; background: linear-gradient(135deg, #eff6ff, #dbeafe);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .dept-img img { width: 100%; height: 100%; object-fit: cover; }
        .dept-img i { font-size: 52px; color: #3b82f6; opacity: .4; }
        .dept-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .dept-name { font-size: 15px; font-weight: 700; color: #0f172a; }
        .dept-desc {
            font-size: 13px; color: #64748b; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .dept-actions { display: flex; gap: 8px; margin-top: auto; padding-top: 10px; }
        .btn-detail {
            flex: 1; padding: 9px 8px; text-align: center; border-radius: 8px;
            border: 1.5px solid #e2e8f0; color: #475569; font-size: 13px; font-weight: 600;
            text-decoration: none; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-detail:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .btn-book {
            flex: 1; padding: 9px 8px; text-align: center; border-radius: 8px;
            background: #2563eb; color: #fff; font-size: 13px; font-weight: 600;
            text-decoration: none; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-book:hover { background: #1d4ed8; }

        .dept-count { font-size: 13px; color: #94a3b8; margin-top: 8px; }

        .empty-box { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 56px; text-align: center; color: #94a3b8; }
        .empty-box i { font-size: 40px; display: block; margin-bottom: 12px; }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .navbar-nav { display: none; }
            .breadcrumb-bar, .page-wrapper { padding-left: 20px; padding-right: 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/home" class="navbar-brand"><i class="bi bi-hospital"></i> HAMS</a>
    <ul class="navbar-nav">
        <li><a href="/home">Trang chủ</a></li>
        <li><a href="/patient/departments" class="active">Chuyên khoa</a></li>
    </ul>
    <div class="navbar-actions">
        <a href="/login" class="btn-nav-outline">Đăng nhập</a>
        <a href="/register" class="btn-nav-filled">Đăng ký</a>
    </div>
</nav>

<div class="breadcrumb-bar">
    <a href="/home"><i class="bi bi-house"></i> Trang chủ</a>
    <i class="bi bi-chevron-right"></i>
    <span>Chuyên khoa</span>
</div>

<div class="page-wrapper">
    <div class="page-header">
        <div>
            <div class="page-title">Chuyên khoa</div>
            <div class="page-subtitle">Xem thông tin các khoa và đội ngũ bác sĩ tương ứng</div>
        </div>
        <a href="/login" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;
           background:#2563eb;color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;">
            <i class="bi bi-calendar-plus"></i> Đặt lịch khám
        </a>
    </div>

    <div class="empty-box" th:if="${#lists.isEmpty(departments)}">
        <i class="bi bi-building-x"></i>
        <p>Chưa có chuyên khoa nào</p>
    </div>

    <div class="dept-grid" th:unless="${#lists.isEmpty(departments)}">
        <div th:each="dept : ${departments}" class="dept-card">
            <div class="dept-img">
                <img th:if="${dept.imageUrl != null}" th:src="${dept.imageUrl}" th:alt="${dept.name}">
                <i th:if="${dept.imageUrl == null}" class="bi bi-hospital"></i>
            </div>
            <div class="dept-body">
                <div class="dept-name" th:text="${dept.name}">Khoa</div>
                <div class="dept-desc" th:if="${dept.description != null}" th:text="${dept.description}"></div>
                <div class="dept-actions">
                    <a th:href="@{/patient/departments/{id}(id=${dept.id})}" class="btn-detail">
                        <i class="bi bi-info-circle"></i> Chi tiết
                    </a>
                    <a th:href="@{/patient/appointments/book/step2(departmentId=${dept.id})}" class="btn-book">
                        <i class="bi bi-calendar-plus"></i> Đặt lịch
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="dept-count" th:unless="${#lists.isEmpty(departments)}"
         th:text="${#lists.size(departments)} + ' chuyên khoa'"></div>
</div>

</body>
</html>
