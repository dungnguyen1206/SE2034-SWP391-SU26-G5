<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${department.name} + ' - HAMS'">Chi tiết chuyên khoa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; color: #1e293b; background: #f8fafc; }

        /* NAVBAR */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: #fff; border-bottom: 1px solid #e2e8f0;
            padding: 0 48px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 22px; font-weight: 800; color: #0f4c81; text-decoration: none;
        }
        .navbar-brand i { font-size: 26px; color: #2563eb; }
        .navbar-nav { display: flex; gap: 32px; list-style: none; }
        .navbar-nav a { color: #475569; text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
        .navbar-nav a:hover { color: #2563eb; }
        .navbar-actions { display: flex; gap: 10px; }
        .btn-nav-outline {
            padding: 8px 18px; border: 1.5px solid #2563eb; border-radius: 8px;
            color: #2563eb; font-size: 14px; font-weight: 600; text-decoration: none; transition: all .2s;
        }
        .btn-nav-outline:hover { background: #eff6ff; }
        .btn-nav-filled {
            padding: 8px 18px; background: #2563eb; border-radius: 8px;
            color: #fff; font-size: 14px; font-weight: 600; text-decoration: none; transition: background .2s;
        }
        .btn-nav-filled:hover { background: #1d4ed8; }

        /* BREADCRUMB */
        .breadcrumb-bar {
            background: #fff; border-bottom: 1px solid #f1f5f9;
            padding: 12px 48px; display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #64748b;
        }
        .breadcrumb-bar a { color: #2563eb; text-decoration: none; }
        .breadcrumb-bar a:hover { text-decoration: underline; }
        .breadcrumb-bar i { font-size: 11px; }

        /* CONTENT */
        .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 32px 48px 64px; }

        /* DEPT HERO CARD */
        .dept-hero {
            background: #fff; border-radius: 16px; border: 1px solid #e2e8f0;
            overflow: hidden; margin-bottom: 28px;
            box-shadow: 0 1px 8px rgba(0,0,0,.04);
        }
        .dept-hero-img {
            height: 200px; background: linear-gradient(135deg, #0f4c81, #2563eb);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .dept-hero-img img { width: 100%; height: 100%; object-fit: cover; }
        .dept-hero-img i { font-size: 80px; color: rgba(255,255,255,.3); }
        .dept-hero-body {
            padding: 24px 28px; display: flex; align-items: flex-start;
            justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }
        .dept-hero-info h1 { font-size: 24px; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
        .dept-hero-info p { font-size: 14px; color: #475569; line-height: 1.7; max-width: 640px; }
        .btn-book-dept {
            padding: 12px 24px; background: #2563eb; border-radius: 10px;
            color: #fff; font-size: 14px; font-weight: 700; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
            transition: background .2s; flex-shrink: 0;
        }
        .btn-book-dept:hover { background: #1d4ed8; }

        /* SECTION TITLE */
        .section-title {
            font-size: 17px; font-weight: 700; color: #0f172a;
            display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
        }
        .section-title i { color: #2563eb; }
        .doctor-count {
            font-size: 13px; font-weight: 400; color: #94a3b8; margin-left: 4px;
        }

        /* DOCTOR CARDS */
        .doctors-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px;
        }
        .doctor-card {
            background: #fff; border-radius: 14px; border: 1px solid #e2e8f0;
            padding: 20px; display: flex; flex-direction: column; gap: 14px;
            transition: all .25s; box-shadow: 0 1px 4px rgba(0,0,0,.04);
        }
        .doctor-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(37,99,235,.1); border-color: #bfdbfe; }
        .doctor-top { display: flex; align-items: center; gap: 12px; }
        .doctor-avatar-circle {
            width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: #1d4ed8; overflow: hidden;
        }
        .doctor-avatar-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .doctor-name { font-size: 14px; font-weight: 700; color: #0f172a; }
        .doctor-degree { font-size: 12px; color: #2563eb; font-weight: 500; margin-top: 2px; }
        .doctor-exp { font-size: 12px; color: #64748b; margin-top: 2px; }
        .doctor-actions { display: flex; gap: 8px; margin-top: auto; }
        .btn-view {
            flex: 1; padding: 8px; text-align: center; border-radius: 8px;
            border: 1.5px solid #e2e8f0; color: #475569; font-size: 12px; font-weight: 600;
            text-decoration: none; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .btn-view:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .btn-book {
            flex: 1; padding: 8px; text-align: center; border-radius: 8px;
            background: #2563eb; color: #fff; font-size: 12px; font-weight: 600;
            text-decoration: none; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .btn-book:hover { background: #1d4ed8; }

        /* EMPTY */
        .empty-box {
            background: #fff; border-radius: 14px; border: 1px solid #e2e8f0;
            padding: 48px; text-align: center; color: #94a3b8;
        }
        .empty-box i { font-size: 40px; display: block; margin-bottom: 12px; }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .navbar-nav { display: none; }
            .breadcrumb-bar { padding: 10px 20px; }
            .page-wrapper { padding: 24px 20px 48px; }
            .dept-hero-body { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/home" class="navbar-brand"><i class="bi bi-hospital"></i> HAMS</a>
    <ul class="navbar-nav">
        <li><a href="/home">Trang chủ</a></li>
        <li><a href="/patient/departments" style="color:#2563eb;font-weight:700;">Chuyên khoa</a></li>
    </ul>
    <div class="navbar-actions">
        <a href="/login" class="btn-nav-outline">Đăng nhập</a>
        <a href="/register" class="btn-nav-filled">Đăng ký</a>
    </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb-bar">
    <a href="/home"><i class="bi bi-house"></i> Trang chủ</a>
    <i class="bi bi-chevron-right"></i>
    <a href="/patient/departments">Chuyên khoa</a>
    <i class="bi bi-chevron-right"></i>
    <span th:text="${department.name}">Chi tiết</span>
</div>

<!-- MAIN -->
<div class="page-wrapper">

    <!-- DEPT HERO -->
    <div class="dept-hero">
        <div class="dept-hero-img">
            <img th:if="${department.imageUrl != null}" th:src="${department.imageUrl}" th:alt="${department.name}">
            <i th:if="${department.imageUrl == null}" class="bi bi-hospital"></i>
        </div>
        <div class="dept-hero-body">
            <div class="dept-hero-info">
                <h1 th:text="${department.name}">Tên khoa</h1>
                <p th:if="${department.description != null}" th:text="${department.description}"></p>
                <p th:if="${department.description == null}" style="color:#94a3b8;">Chưa có mô tả</p>
            </div>
            <!-- Đặt lịch → Spring Security redirect về /login nếu chưa đăng nhập -->
            <a th:href="@{/patient/appointments/book/step2(departmentId=${department.id})}" class="btn-book-dept">
                <i class="bi bi-calendar-plus"></i> Đặt lịch khoa này
            </a>
        </div>
    </div>

    <!-- DOCTOR LIST -->
    <div class="section-title">
        <i class="bi bi-people-fill"></i>
        Đội ngũ bác sĩ
        <span class="doctor-count" th:text="'(' + ${#lists.size(doctors)} + ' bác sĩ)'"></span>
    </div>

    <div class="empty-box" th:if="${#lists.isEmpty(doctors)}">
        <i class="bi bi-person-x"></i>
        <p>Chưa có bác sĩ trong khoa này</p>
    </div>

    <div class="doctors-grid" th:unless="${#lists.isEmpty(doctors)}">
        <div th:each="doc : ${doctors}" class="doctor-card">
            <div class="doctor-top">
                <div class="doctor-avatar-circle">
                    <img th:if="${doc.avatar != null}" th:src="${doc.avatar}" th:alt="${doc.fullName}">
                    <span th:if="${doc.avatar == null}"
                          th:text="${doc.firstName != null ? doc.firstName.substring(0,1).toUpperCase() : 'BS'}"></span>
                </div>
                <div>
                    <div class="doctor-name">
                        <span th:if="${doc.degree != null}" th:text="${doc.degree + '. '}"></span>
                        <span th:text="${doc.fullName}"></span>
                    </div>
                    <div class="doctor-degree" th:if="${doc.degree != null}" th:text="${doc.degree}"></div>
                    <div class="doctor-exp" th:if="${doc.experienceYears != null and doc.experienceYears > 0}"
                         th:text="${doc.experienceYears} + ' năm kinh nghiệm'"></div>
                </div>
            </div>
            <div class="doctor-actions">
                <!-- Xem chi tiết bác sĩ: public -->
                <a th:href="@{/patient/doctors/{id}(id=${doc.id})}" class="btn-view">
                    <i class="bi bi-person-lines-fill"></i> Xem thêm
                </a>
                <!-- Đặt lịch: yêu cầu login -->
                <a th:href="@{/patient/appointments/book/step2(departmentId=${department.id}, doctorId=${doc.id})}"
                   class="btn-book">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch
                </a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
