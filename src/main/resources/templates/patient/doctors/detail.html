<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết bác sĩ</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="patient-layout">
        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('doctors')}"></div>
        <main class="patient-main">

            <!-- Header -->
            <div class="patient-page-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <a th:href="@{/patient/doctors}" class="patient-back-link"><i class="bi bi-arrow-left"></i></a>
                    <div>
                        <h2>Chi tiết bác sĩ</h2>
                        <p th:text="${doctor.fullName}"></p>
                    </div>
                </div>
                <a th:href="@{/patient/appointments/book/step2(departmentId=${doctor.departmentId},doctorId=${doctor.id})}"
                    class="btn-primary">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch với bác sĩ này
                </a>
            </div>

            <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;">

                <!-- Card trái: avatar + thông tin cơ bản -->
                <div class="patient-card" style="padding:24px;text-align:center;">
                    <div class="doctor-avatar" style="width:80px;height:80px;font-size:32px;margin:0 auto 12px;"
                        th:text="${doctor.firstName != null} ? ${doctor.firstName.substring(0,1).toUpperCase()} : 'BS'">
                    </div>
                    <div style="font-size:18px;font-weight:700;color:#0f172a;margin-bottom:4px;"
                        th:text="${doctor.fullName}"></div>
                    <div style="font-size:13px;color:#1d4ed8;font-weight:600;margin-bottom:16px;"
                        th:text="${doctor.degree}"></div>

                    <div
                        style="text-align:left;display:flex;flex-direction:column;gap:10px;font-size:13px;color:#475569;">
                        <div th:if="${doctor.departmentName != null}">
                            <div
                                style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:2px;">
                                Chuyên khoa</div>
                            <a th:if="${doctor.departmentId != null}"
                                th:href="@{/patient/departments/{id}(id=${doctor.departmentId})}"
                                style="color:#0f4c81;font-weight:600;text-decoration:none;"
                                th:text="${doctor.departmentName}"></a>
                        </div>
                        <div th:if="${doctor.experienceYears != null and doctor.experienceYears > 0}">
                            <div
                                style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:2px;">
                                Kinh nghiệm</div>
                            <div th:text="${doctor.experienceYears} + ' năm'"></div>
                        </div>
                        <div th:if="${doctor.licenseNumber != null}">
                            <div
                                style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:2px;">
                                Số chứng chỉ</div>
                            <div th:text="${doctor.licenseNumber}"></div>
                        </div>
                    </div>

                    <a th:href="@{/patient/appointments/book/step2(departmentId=${doctor.departmentId},doctorId=${doctor.id})}"
                        class="btn-primary" style="width:100%;justify-content:center;margin-top:20px;">
                        <i class="bi bi-calendar-plus"></i> Đặt lịch ngay
                    </a>
                </div>

                <!-- Card phải: giới thiệu -->
                <div>
                    <div class="patient-card" style="padding:24px;"
                        th:if="${doctor.bio != null and !doctor.bio.isEmpty()}">
                        <div class="patient-card-header" style="margin-bottom:12px;">
                            <i class="bi bi-info-circle"></i>
                            <h3>Giới thiệu</h3>
                        </div>
                        <p style="font-size:14px;color:#334155;line-height:1.8;margin:0;" th:text="${doctor.bio}"></p>
                    </div>

                    <div th:if="${doctor.bio == null or doctor.bio.isEmpty()}" class="patient-card"
                        style="padding:24px;">
                        <div class="empty-state" style="padding:20px 0;">
                            <i class="bi bi-info-circle" style="font-size:32px;"></i>
                            <p>Chưa có thông tin giới thiệu</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</body>

</html>
