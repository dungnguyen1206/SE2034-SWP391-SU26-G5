<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${doctor.fullName} + ' - HAMS'">Chi tiết bác sĩ</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .detail-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 768px) {
            .detail-layout { grid-template-columns: 1fr; }
        }
        .profile-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
        }
        .profile-av {
            width: 88px; height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; font-weight: 800; color: #1d4ed8;
            margin: 0 auto 16px;
            overflow: hidden;
        }
        .profile-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-name { font-size: 17px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
        .profile-degree { font-size: 13px; color: #2563eb; font-weight: 600; margin-bottom: 20px; }
        .profile-meta { text-align: left; display: flex; flex-direction: column; gap: 14px; }
        .meta-label { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 3px; letter-spacing: .5px; }
        .meta-value { font-size: 13px; color: #334155; }
        .meta-value a { color: #0f4c81; font-weight: 600; text-decoration: none; }
        .meta-value a:hover { text-decoration: underline; }
        .info-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .info-card:last-child { margin-bottom: 0; }
        .info-card-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 15px; font-weight: 700; color: #0f172a;
            margin-bottom: 14px;
        }
        .info-card-title i { color: #2563eb; }
        .bio-text { font-size: 14px; color: #334155; line-height: 1.8; }
    </style>
</head>
<body>
<div class="patient-layout">
    <div th:replace="~{patient/fragments/sidebar :: patientSidebar('doctors')}"></div>
    <main class="patient-main">

        <!-- Header -->
        <div class="patient-page-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a th:href="@{/patient/doctors}" class="patient-back-link">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h2 th:text="${doctor.fullName}">Chi tiết bác sĩ</h2>
                    <p th:text="${doctor.departmentName}"></p>
                </div>
            </div>
            <a th:href="@{/patient/appointments/book/step2(departmentId=${doctor.departmentId},doctorId=${doctor.id})}"
               class="btn-primary">
                <i class="bi bi-calendar-plus"></i> Đặt lịch với bác sĩ này
            </a>
        </div>

        <div class="detail-layout">

            <!-- Cột trái: profile card -->
            <div class="profile-card">
                <div class="profile-av">
                    <img th:if="${doctor.avatar != null}" th:src="${doctor.avatar}" th:alt="${doctor.fullName}">
                    <span th:if="${doctor.avatar == null}"
                          th:text="${doctor.firstName != null ? doctor.firstName.substring(0,1).toUpperCase() : 'BS'}"></span>
                </div>

                <div class="profile-name">
                    <span th:if="${doctor.degree != null}" th:text="${doctor.degree + '. '}"></span>
                    <span th:text="${doctor.fullName}"></span>
                </div>
                <div class="profile-degree" th:if="${doctor.degree != null}" th:text="${doctor.degree}"></div>

                <div class="profile-meta">
                    <div th:if="${doctor.departmentName != null}">
                        <div class="meta-label">Chuyên khoa</div>
                        <div class="meta-value">
                            <a th:if="${doctor.departmentId != null}"
                               th:href="@{/patient/departments/{id}(id=${doctor.departmentId})}"
                               th:text="${doctor.departmentName}"></a>
                            <span th:if="${doctor.departmentId == null}" th:text="${doctor.departmentName}"></span>
                        </div>
                    </div>
                    <div th:if="${doctor.experienceYears != null and doctor.experienceYears > 0}">
                        <div class="meta-label">Kinh nghiệm</div>
                        <div class="meta-value" th:text="${doctor.experienceYears} + ' năm'"></div>
                    </div>
                    <div th:if="${doctor.licenseNumber != null}">
                        <div class="meta-label">Số chứng chỉ hành nghề</div>
                        <div class="meta-value" th:text="${doctor.licenseNumber}"></div>
                    </div>
                </div>

                <a th:href="@{/patient/appointments/book/step2(departmentId=${doctor.departmentId},doctorId=${doctor.id})}"
                   class="btn-primary"
                   style="width:100%;justify-content:center;margin-top:24px;display:flex;">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch ngay
                </a>
            </div>

            <!-- Cột phải: thông tin chi tiết -->
            <div>
                <!-- Giới thiệu -->
                <div class="info-card"
                     th:if="${doctor.bio != null and !#strings.isEmpty(doctor.bio)}">
                    <div class="info-card-title">
                        <i class="bi bi-person-lines-fill"></i>
                        Giới thiệu
                    </div>
                    <p class="bio-text" th:text="${doctor.bio}"></p>
                </div>

                <!-- Thông tin chuyên môn -->
                <div class="info-card">
                    <div class="info-card-title">
                        <i class="bi bi-award"></i>
                        Thông tin chuyên môn
                    </div>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <div th:if="${doctor.degree != null}"
                             style="display:flex;align-items:flex-start;gap:10px;font-size:13px;">
                            <i class="bi bi-mortarboard" style="color:#2563eb;margin-top:1px;"></i>
                            <div>
                                <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px;">Học vị / Bằng cấp</div>
                                <div style="color:#334155;" th:text="${doctor.degree}"></div>
                            </div>
                        </div>
                        <div th:if="${doctor.experienceYears != null and doctor.experienceYears > 0}"
                             style="display:flex;align-items:flex-start;gap:10px;font-size:13px;">
                            <i class="bi bi-clock-history" style="color:#2563eb;margin-top:1px;"></i>
                            <div>
                                <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px;">Kinh nghiệm</div>
                                <div style="color:#334155;" th:text="${doctor.experienceYears} + ' năm'"></div>
                            </div>
                        </div>
                        <div th:if="${doctor.licenseNumber != null}"
                             style="display:flex;align-items:flex-start;gap:10px;font-size:13px;">
                            <i class="bi bi-patch-check" style="color:#2563eb;margin-top:1px;"></i>
                            <div>
                                <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px;">Số chứng chỉ hành nghề</div>
                                <div style="color:#334155;" th:text="${doctor.licenseNumber}"></div>
                            </div>
                        </div>
                        <div th:if="${doctor.departmentName != null}"
                             style="display:flex;align-items:flex-start;gap:10px;font-size:13px;">
                            <i class="bi bi-building-cross" style="color:#2563eb;margin-top:1px;"></i>
                            <div>
                                <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px;">Chuyên khoa</div>
                                <div style="color:#334155;">
                                    <a th:if="${doctor.departmentId != null}"
                                       th:href="@{/patient/departments/{id}(id=${doctor.departmentId})}"
                                       style="color:#0f4c81;font-weight:600;text-decoration:none;"
                                       th:text="${doctor.departmentName}"></a>
                                    <span th:if="${doctor.departmentId == null}" th:text="${doctor.departmentName}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Đặt lịch CTA -->
                <div class="info-card" style="background: linear-gradient(135deg,#eff6ff,#dbeafe);">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                        <div>
                            <div style="font-size:15px;font-weight:700;color:#0f172a;">Bạn muốn đặt lịch khám?</div>
                            <div style="font-size:13px;color:#475569;margin-top:4px;">
                                Đặt lịch nhanh với bác sĩ
                                <span th:if="${doctor.degree != null}" th:text="${doctor.degree + '. '}"></span>
                                <span th:text="${doctor.fullName}"></span>
                            </div>
                        </div>
                        <a th:href="@{/patient/appointments/book/step2(departmentId=${doctor.departmentId},doctorId=${doctor.id})}"
                           class="btn-primary">
                            <i class="bi bi-calendar-plus"></i> Đặt lịch ngay
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>
</body>
</html>
