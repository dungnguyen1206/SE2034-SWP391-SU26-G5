<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đội ngũ bác sĩ - HAMS</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }
        .doc-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow .2s, transform .2s, border-color .2s;
        }
        .doc-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(37,99,235,.11);
            border-color: #bfdbfe;
        }
        .doc-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid #f1f5f9;
        }
        .doc-av {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: #1d4ed8;
            flex-shrink: 0; overflow: hidden;
        }
        .doc-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .doc-name { font-size: 15px; font-weight: 700; color: #0f172a; }
        .doc-degree { font-size: 12px; color: #2563eb; font-weight: 500; margin-top: 2px; }
        .doc-body {
            padding: 14px 20px;
            flex: 1;
            display: flex; flex-direction: column; gap: 7px;
        }
        .doc-info-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #475569;
        }
        .doc-info-row i { color: #2563eb; font-size: 14px; flex-shrink: 0; }
        .doc-bio {
            font-size: 12px; color: #64748b; line-height: 1.6; margin-top: 2px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .doc-footer {
            padding: 12px 20px 16px;
            display: flex; gap: 8px;
        }
        .filter-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .filter-tag {
            padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
            border: 1.5px solid #e2e8f0; color: #475569; text-decoration: none;
            background: #fff; transition: all .2s;
        }
        .filter-tag:hover { border-color: #2563eb; color: #2563eb; }
        .filter-tag.active { background: #2563eb; border-color: #2563eb; color: #fff; }
        .result-count { font-size: 13px; color: #94a3b8; margin-top: 6px; }
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .pagination-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all .2s;
            cursor: pointer;
        }
        .pagination-btn:hover:not(.disabled) {
            border-color: #2563eb;
            color: #2563eb;
            background: #f8fafc;
        }
        .pagination-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }
        .pagination-btn.disabled {
            color: #cbd5e1;
            border-color: #f1f5f9;
            background: #f8fafc;
            cursor: not-allowed;
            pointer-events: none;
        }
        .pagination-info {
            font-size: 13px;
            color: #64748b;
            margin-right: auto;
        }
    </style>
</head>
<body>
<div class="patient-layout">
    <div th:replace="~{patient/fragments/sidebar :: patientSidebar('doctors')}"></div>
    <main class="patient-main">

        <!-- Page header -->
        <div class="patient-page-header">
            <div>
                <h2>Đội ngũ bác sĩ</h2>
                <p>Tìm kiếm bác sĩ theo chuyên khoa và đặt lịch khám</p>
            </div>
            <a th:href="@{/patient/appointments/book}" class="btn-primary">
                <i class="bi bi-calendar-plus"></i> Đặt lịch khám
            </a>
        </div>

        <!-- Search bar -->
        <div style="margin-bottom: 20px; max-width: 400px;">
            <form th:action="@{/patient/doctors}" method="get" style="display: flex; gap: 8px;">
                <input type="hidden" name="departmentId" th:value="${selectedDepartmentId}" />
                <div style="position: relative; flex: 1;">
                    <i class="bi bi-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                    <input type="text" name="search" th:value="${searchQuery}" placeholder="Tìm tên bác sĩ..." 
                           style="width: 100%; padding: 10px 12px 10px 36px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color .2s;"
                           onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#e2e8f0'"/>
                </div>
                <button type="submit" class="btn-primary" style="padding: 10px 16px;">Tìm kiếm</button>
            </form>
        </div>

        <!-- Filter theo khoa -->
        <div class="filter-wrap">
            <a th:href="@{/patient/doctors(search=${searchQuery})}"
               class="filter-tag"
               th:classappend="${selectedDepartmentId == null} ? ' active'">
                <i class="bi bi-grid-3x3-gap"></i> Tất cả
            </a>
            <a th:each="dept : ${departments}"
               th:href="@{/patient/doctors(departmentId=${dept.id}, search=${searchQuery})}"
               class="filter-tag"
               th:classappend="${selectedDepartmentId != null and selectedDepartmentId == dept.id} ? ' active'"
               th:text="${dept.name}">Khoa</a>
        </div>

        <!-- Empty -->
        <div th:if="${#lists.isEmpty(doctors)}" class="patient-card">
            <div class="empty-state">
                <i class="bi bi-person-x" style="font-size:40px;"></i>
                <p>Không có bác sĩ nào</p>
                <a th:href="@{/patient/doctors}" class="btn-secondary" style="margin-top:12px;">
                    Xem tất cả
                </a>
            </div>
        </div>

        <!-- Grid -->
        <div class="doc-grid" th:unless="${#lists.isEmpty(doctors)}">
            <div th:each="doc : ${doctors}" class="doc-card">

                <div class="doc-header">
                    <div class="doc-av">
                        <img th:if="${doc.avatar != null}" th:src="${doc.avatar}" th:alt="${doc.fullName}">
                        <span th:if="${doc.avatar == null}"
                              th:text="${doc.firstName != null ? doc.firstName.substring(0,1).toUpperCase() : 'BS'}"></span>
                    </div>
                    <div style="min-width:0;">
                        <div class="doc-name" th:text="${doc.fullName}"></div>
                        <div class="doc-degree" th:if="${doc.departmentName != null}" th:text="${doc.departmentName}"></div>
                    </div>
                </div>

                <div class="doc-body">
                    <div class="doc-info-row"
                         th:if="${doc.experienceYears != null and doc.experienceYears > 0}">
                        <i class="bi bi-award"></i>
                        <span th:text="${doc.experienceYears} + ' năm kinh nghiệm'"></span>
                    </div>
                </div>

                <div class="doc-footer">
                    <a th:href="@{/patient/doctors/{id}(id=${doc.id})}"
                       class="btn-secondary"
                       style="flex:1;justify-content:center;font-size:13px;">
                        <i class="bi bi-person-lines-fill"></i> Chi tiết
                    </a>
                    <a th:href="@{/patient/appointments/book/step2(departmentId=${doc.departmentId},doctorId=${doc.id})}"
                       class="btn-primary"
                       style="flex:1;justify-content:center;font-size:13px;">
                        <i class="bi bi-calendar-plus"></i> Đặt lịch
                    </a>
                </div>

            </div>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="pagination">
            <div class="pagination-info" th:text="'Hiển thị trang ' + (${currentPage + 1}) + ' / ' + ${totalPages} + ' (Tổng số ' + ${totalItems} + ' bác sĩ)'"></div>
            
            <a th:href="@{/patient/doctors(departmentId=${selectedDepartmentId}, search=${searchQuery}, page=${currentPage - 1})}"
               class="pagination-btn" th:classappend="${currentPage == 0} ? ' disabled'">
                <i class="bi bi-chevron-left"></i>
            </a>
            
            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/patient/doctors(departmentId=${selectedDepartmentId}, search=${searchQuery}, page=${i})}"
                   class="pagination-btn" th:classappend="${currentPage == i} ? ' active'"
                   th:text="${i + 1}">1</a>
            </th:block>
            
            <a th:href="@{/patient/doctors(departmentId=${selectedDepartmentId}, search=${searchQuery}, page=${currentPage + 1})}"
               class="pagination-btn" th:classappend="${currentPage == totalPages - 1} ? ' disabled'">
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>

        <div class="result-count" th:unless="${#lists.isEmpty(doctors)}"
             th:text="'Tổng số: ' + ${totalItems} + ' bác sĩ'"></div>

    </main>
</div>
</body>
</html>
