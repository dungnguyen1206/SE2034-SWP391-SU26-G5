<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách bác sĩ</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="patient-layout">
        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('doctors')}"></div>
        <main class="patient-main">

            <div class="patient-page-header">
                <div>
                    <h2>Đội ngũ bác sĩ</h2>
                    <p>Tìm kiếm và xem thông tin bác sĩ theo chuyên khoa</p>
                </div>
                <a th:href="@{/patient/appointments/book}" class="btn-primary">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch khám
                </a>
            </div>

            <!-- Filter theo khoa -->
            <div class="appt-filter-bar" style="flex-wrap:wrap;gap:8px;">
                <a th:href="@{/patient/doctors}" class="appt-filter-btn"
                    th:classappend="${selectedDepartmentId == null} ? ' active'">Tất cả</a>
                <a th:each="dept : ${departments}" th:href="@{/patient/doctors(departmentId=${dept.id})}"
                    class="appt-filter-btn"
                    th:classappend="${selectedDepartmentId != null and selectedDepartmentId == dept.id} ? ' active'"
                    th:text="${dept.name}">Khoa</a>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(doctors)}" class="patient-card">
                <div class="empty-state">
                    <i class="bi bi-person-x" style="font-size:40px;"></i>
                    <p>Không có bác sĩ nào trong khoa này</p>
                </div>
            </div>

            <!-- Doctor grid -->
            <div th:unless="${#lists.isEmpty(doctors)}"
                style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:4px;">
                <div th:each="doc : ${doctors}" class="patient-card"
                    style="padding:20px;display:flex;flex-direction:column;gap:14px;">
                    <!-- Avatar + tên -->
                    <div style="display:flex;align-items:center;gap:14px;">
                        <div class="doctor-avatar" style="width:52px;height:52px;font-size:20px;flex-shrink:0;"
                            th:text="${doc.firstName != null} ? ${doc.firstName.substring(0,1).toUpperCase()} : 'BS'">
                        </div>
                        <div>
                            <div style="font-weight:700;font-size:15px;color:#0f172a;" th:text="${doc.fullName}"></div>
                            <div style="font-size:12px;color:#1d4ed8;" th:text="${doc.degree}"></div>
                        </div>
                    </div>
                    <!-- Thông tin -->
                    <div style="font-size:13px;color:#475569;display:flex;flex-direction:column;gap:5px;">
                        <div th:if="${doc.departmentName != null}">
                            <i class="bi bi-building-cross" style="color:#0f4c81;margin-right:5px;"></i>
                            <span th:text="${doc.departmentName}"></span>
                        </div>
                        <div th:if="${doc.experienceYears != null and doc.experienceYears > 0}">
                            <i class="bi bi-award" style="color:#0f4c81;margin-right:5px;"></i>
                            <span th:text="${doc.experienceYears} + ' năm kinh nghiệm'"></span>
                        </div>
                        <div th:if="${doc.bio != null}" style="color:#64748b;font-size:12px;line-height:1.5;
                         display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                            th:text="${doc.bio}"></div>
                    </div>
                    <!-- Actions -->
                    <div style="display:flex;gap:8px;margin-top:auto;">
                        <a th:href="@{/patient/doctors/{id}(id=${doc.id})}" class="btn-secondary"
                            style="flex:1;justify-content:center;font-size:13px;">
                            <i class="bi bi-person-lines-fill"></i> Xem chi tiết
                        </a>
                        <a th:href="@{/patient/appointments/book/step2(departmentId=${doc.departmentId},doctorId=${doc.id})}"
                            class="btn-primary" style="flex:1;justify-content:center;font-size:13px;">
                            <i class="bi bi-calendar-plus"></i> Đặt lịch
                        </a>
                    </div>
                </div>
            </div>

            <div style="margin-top:12px;font-size:13px;color:#94a3b8;" th:unless="${#lists.isEmpty(doctors)}"
                th:text="${#lists.size(doctors)} + ' bác sĩ'"></div>

        </main>
    </div>
</body>

</html>
