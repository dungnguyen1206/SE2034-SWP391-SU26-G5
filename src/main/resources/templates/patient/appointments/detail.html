<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết lịch hẹn</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<div class="patient-layout">
    <div th:replace="~{patient/fragments/sidebar :: patientSidebar('appointments')}"></div>
    <main class="patient-main">

        <div th:if="${successMessage}" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error">
            <i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span>
        </div>

        <div class="patient-page-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <a th:href="@{/patient/appointments}" class="patient-back-link"><i class="bi bi-arrow-left"></i></a>
                <div>
                    <h2>Chi tiết lịch hẹn</h2>
                    <p th:text="'Mã: ' + ${appointment.appointmentCode}"></p>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span class="status-badge"
                      th:classappend="${appointment.status == 'WAITING'} ? 'status-pending' :
                                      (${appointment.status == 'CONFIRMED'} ? 'status-confirmed' :
                                      (${appointment.status == 'EXAMINING'} ? 'status-checked-in' :
                                      (${appointment.status == 'COMPLETED'} ? 'status-completed' :
                                      (${appointment.status == 'CANCELLED'} ? 'status-cancelled' : 'status-no-show'))))"
                      th:text="${appointment.status == 'WAITING'} ? 'Chờ xác nhận' :
                               (${appointment.status == 'CONFIRMED'} ? 'Đã xác nhận' :
                               (${appointment.status == 'EXAMINING'} ? 'Đang khám' :
                               (${appointment.status == 'COMPLETED'} ? 'Hoàn thành' :
                               (${appointment.status == 'CANCELLED'} ? 'Đã hủy' : 'Vắng mặt'))))">
                </span>
                <form th:if="${appointment.status == 'WAITING' or appointment.status == 'CONFIRMED'}"
                      th:action="@{/patient/appointments/{id}/cancel(id=${appointment.id})}"
                      method="post" style="margin:0"
                      onsubmit="return confirm('Bạn có chắc muốn hủy lịch hẹn này?')">
                    <button type="submit" class="btn-danger">
                        <i class="bi bi-x-circle"></i> Hủy lịch hẹn
                    </button>
                </form>
                <a th:if="${appointment.hasMedicalRecord}" th:href="@{/patient/records}" class="btn-secondary">
                    <i class="bi bi-file-earmark-medical"></i> Xem bệnh án
                </a>
            </div>
        </div>

        <div class="appt-detail-grid">
            <div class="appt-detail-section">
                <h4><i class="bi bi-calendar-event" style="margin-right:6px;"></i>Thông tin lịch hẹn</h4>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Mã lịch hẹn</span>
                    <span class="appt-detail-value"><span class="appt-code-badge" th:text="${appointment.appointmentCode}"></span></span>
                </div>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Ngày khám</span>
                    <span class="appt-detail-value" th:text="${#temporals.format(appointment.bookingDate, 'EEEE, dd/MM/yyyy')}"></span>
                </div>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Ca khám</span>
                    <span class="appt-detail-value">
                        <span th:if="${appointment.shift == 'MORNING'}" style="color:#b45309;font-weight:600;"><i class="bi bi-sunrise"></i> Ca sáng</span>
                        <span th:if="${appointment.shift == 'AFTERNOON'}" style="color:#0e7490;font-weight:600;"><i class="bi bi-sunset"></i> Ca chiều</span>
                    </span>
                </div>
                <div class="appt-detail-row" th:if="${appointment.slotStartTime != null}">
                    <span class="appt-detail-label">Khung giờ</span>
                    <span class="appt-detail-value"
                          th:text="${#temporals.format(appointment.slotStartTime, 'HH:mm')} + ' - ' + ${#temporals.format(appointment.slotEndTime, 'HH:mm')}"></span>
                </div>
                <div class="appt-detail-row" th:if="${appointment.roomNumber != null}">
                    <span class="appt-detail-label">Phòng khám</span>
                    <span class="appt-detail-value" th:text="${appointment.roomNumber}"></span>
                </div>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Ngày đặt</span>
                    <span class="appt-detail-value" th:text="${#temporals.format(appointment.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
            </div>

            <div class="appt-detail-section">
                <h4><i class="bi bi-person-badge" style="margin-right:6px;"></i>Bác sĩ & Dịch vụ</h4>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Bác sĩ</span>
                    <span class="appt-detail-value" style="font-weight:600;" th:text="${appointment.doctorFullName}"></span>
                </div>
                <div class="appt-detail-row" th:if="${appointment.doctorDegree != null}">
                    <span class="appt-detail-label">Học vị</span>
                    <span class="appt-detail-value" th:text="${appointment.doctorDegree}"></span>
                </div>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Khoa</span>
                    <span class="appt-detail-value" th:text="${appointment.departmentName}"></span>
                </div>
                <div class="appt-detail-row">
                    <span class="appt-detail-label">Dịch vụ</span>
                    <span class="appt-detail-value" th:text="${appointment.serviceName}"></span>
                </div>
            </div>

            <div class="appt-detail-section" th:if="${appointment.note != null and !appointment.note.isEmpty()}"
                 style="grid-column: 1 / -1;">
                <h4><i class="bi bi-chat-text" style="margin-right:6px;"></i>Triệu chứng / Ghi chú</h4>
                <p style="margin:0;font-size:14px;color:#334155;line-height:1.6;" th:text="${appointment.note}"></p>
            </div>
        </div>

    </main>
</div>
</body>
</html>
