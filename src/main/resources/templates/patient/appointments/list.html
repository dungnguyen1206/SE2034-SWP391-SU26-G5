<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch hẹn của tôi</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<div class="patient-layout">
    <div th:replace="~{patient/fragments/sidebar :: patientSidebar('appointments')}"></div>
    <main class="patient-main">

        <div th:if="${successMessage}" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error">
            <i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span>
        </div>

        <div class="patient-page-header">
            <div>
                <h2>Lịch hẹn của tôi</h2>
                <p>Quản lý toàn bộ lịch hẹn khám bệnh</p>
            </div>
            <a th:href="@{/patient/appointments/book}" class="btn-primary">
                <i class="bi bi-calendar-plus"></i> Đặt lịch mới
            </a>
        </div>

        <!-- Filter bar -->
        <div class="appt-filter-bar">
            <button class="appt-filter-btn active" onclick="filterTable('ALL', this)">Tất cả</button>
            <button class="appt-filter-btn" onclick="filterTable('CONFIRMED', this)">Đã đặt lịch</button>
            <button class="appt-filter-btn" onclick="filterTable('EXAMINING', this)">Đang khám</button>
            <button class="appt-filter-btn" onclick="filterTable('COMPLETED', this)">Hoàn thành</button>
            <button class="appt-filter-btn" onclick="filterTable('CANCELLED', this)">Đã hủy</button>
        </div>

        <div th:if="${#lists.isEmpty(appointments)}" class="patient-card">
            <div class="empty-state">
                <i class="bi bi-calendar-x"></i>
                <p>Bạn chưa có lịch hẹn nào</p>
                <a th:href="@{/patient/appointments/book}" class="btn-primary">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch ngay
                </a>
            </div>
        </div>

        <div th:unless="${#lists.isEmpty(appointments)}" class="patient-table-card">
            <table class="patient-table" id="apptTable">
                <thead>
                    <tr>
                        <th>Mã lịch hẹn</th>
                        <th>Bác sĩ / Khoa</th>
                        <th>Dịch vụ</th>
                        <th>Ngày khám</th>
                        <th>Ca khám</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appt : ${appointments}" th:data-status="${appt.status}">
                        <td><span class="appt-code-badge" th:text="${appt.appointmentCode}">APT-001</span></td>
                        <td>
                            <div style="font-weight:600;color:#0f172a;" th:text="${appt.doctorFullName}"></div>
                            <div style="font-size:12px;color:#64748b;" th:text="${appt.departmentName}"></div>
                        </td>
                        <td th:text="${appt.serviceName}"></td>
                        <td th:text="${#temporals.format(appt.bookingDate, 'dd/MM/yyyy')}"></td>
                        <td>
                            <span th:if="${appt.shift == 'MORNING'}" style="color:#b45309;font-weight:600;font-size:13px;"><i class="bi bi-sunrise"></i> Ca sáng</span>
                            <span th:if="${appt.shift == 'AFTERNOON'}" style="color:#0e7490;font-weight:600;font-size:13px;"><i class="bi bi-sunset"></i> Ca chiều</span>
                            <span th:if="${appt.slotStartTime != null}" style="font-size:12px;color:#94a3b8;display:block;"
                                  th:text="${#temporals.format(appt.slotStartTime, 'HH:mm')} + ' - ' + ${#temporals.format(appt.slotEndTime, 'HH:mm')}"></span>
                        </td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${appt.status == 'WAITING'} ? 'status-pending' :
                                                  (${appt.status == 'CONFIRMED'} ? 'status-confirmed' :
                                                  (${appt.status == 'EXAMINING'} ? 'status-checked-in' :
                                                  (${appt.status == 'COMPLETED'} ? 'status-completed' :
                                                  (${appt.status == 'CANCELLED'} ? 'status-cancelled' : 'status-no-show'))))"
                                  th:text="${appt.status == 'WAITING'} ? 'Đã đặt lịch' :
                                           (${appt.status == 'CONFIRMED'} ? 'Đã đặt lịch' :
                                           (${appt.status == 'EXAMINING'} ? 'Đang khám' :
                                           (${appt.status == 'COMPLETED'} ? 'Hoàn thành' :
                                           (${appt.status == 'CANCELLED'} ? 'Đã hủy' : 'Vắng mặt'))))">
                            </span>
                        </td>
                        <td>
                            <div class="appt-actions">
                                <a th:href="@{/patient/appointments/{id}(id=${appt.id})}" class="appt-action-view" title="Xem chi tiết">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <form th:if="${appt.status == 'WAITING' or appt.status == 'CONFIRMED'}"
                                      th:action="@{/patient/appointments/{id}/cancel(id=${appt.id})}"
                                      method="post" style="margin:0"
                                      onsubmit="return confirm('Bạn có chắc muốn hủy lịch hẹn này?')">
                                    <button type="submit" class="appt-action-cancel" title="Hủy lịch hẹn">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="patient-table-footer" th:text="${#lists.size(appointments)} + ' lịch hẹn'"></div>
        </div>

    </main>
</div>
<script>
function filterTable(status, btn) {
    document.querySelectorAll('#apptTable tbody tr').forEach(row => {
        row.style.display = (status === 'ALL' || row.dataset.status === status) ? '' : 'none';
    });
    document.querySelectorAll('.appt-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>
</body>
</html>
