<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đặt lịch khám - Chọn chuyên khoa</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

    <div class="patient-layout">

        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('book')}"></div>

        <main class="patient-main">

            <!-- Header -->
            <div class="patient-page-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <a th:href="@{/patient/dashboard}" class="patient-back-link">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <div>
                        <h2>Đặt lịch khám</h2>
                        <p>Bước 1 / 2 — Chọn chuyên khoa bạn muốn khám</p>
                    </div>
                </div>
            </div>

            <!-- Step indicator -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;">
                <div
                    style="display:flex;align-items:center;gap:8px;background:#0f4c81;color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;">
                    <span
                        style="width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;">1</span>
                    Chọn chuyên khoa
                </div>
                <div style="width:40px;height:2px;background:#dde3ea;"></div>
                <div
                    style="display:flex;align-items:center;gap:8px;background:#f1f5f9;color:#94a3b8;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;">
                    <span
                        style="width:22px;height:22px;border-radius:50%;background:#dde3ea;display:flex;align-items:center;justify-content:center;font-size:12px;">2</span>
                    Chọn bác sĩ & đặt lịch
                </div>
            </div>

            <!-- Department grid -->
            <div th:if="${#lists.isEmpty(departments)}" class="patient-card">
                <div class="empty-state">
                    <i class="bi bi-building-x"></i>
                    <p>Hiện chưa có chuyên khoa nào hoạt động</p>
                </div>
            </div>

            <div th:unless="${#lists.isEmpty(departments)}" class="dept-grid">
                <a th:each="dept : ${departments}"
                    th:href="@{/patient/appointments/book/step2(departmentId=${dept.id})}" class="dept-card">
                    <div class="dept-card-icon">
                        <i class="bi bi-heart-pulse"></i>
                    </div>
                    <div class="dept-card-name" th:text="${dept.name}">Nội tổng quát</div>
                    <div class="dept-card-desc" th:text="${dept.description}">Mô tả chuyên khoa</div>
                    <div class="dept-card-arrow">
                        Chọn khoa này <i class="bi bi-arrow-right"></i>
                    </div>
                </a>
            </div>

        </main>
    </div>

</body>

</html>
