<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Hồ sơ bệnh án</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="patient-layout">
        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('records')}"></div>
        <main class="patient-main">

            <div class="patient-page-header">
                <div>
                    <h2>Hồ sơ bệnh án</h2>
                    <p>Lịch sử khám bệnh và kết quả chẩn đoán</p>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(records)}" class="patient-card">
                <div class="empty-state">
                    <i class="bi bi-file-earmark-x"></i>
                    <p>Bạn chưa có hồ sơ bệnh án nào</p>
                    <a th:href="@{/patient/appointments/book}" class="btn-primary">
                        <i class="bi bi-calendar-plus"></i> Đặt lịch khám
                    </a>
                </div>
            </div>

            <div th:unless="${#lists.isEmpty(records)}" class="patient-table-card">
                <table class="patient-table">
                    <thead>
                        <tr>
                            <th>Ngày khám</th>
                            <th>Bác sĩ / Khoa</th>
                            <th>Dịch vụ</th>
                            <th>Chẩn đoán</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${records}">
                            <td>
                                <div style="font-weight:600;color:#0f172a;"
                                    th:text="${#temporals.format(record.examinationDate, 'dd/MM/yyyy')}"></div>
                                <div style="font-size:12px;color:#64748b;"
                                    th:text="${#temporals.format(record.examinationDate, 'HH:mm')}"></div>
                            </td>
                            <td>
                                <div style="font-weight:600;color:#0f172a;" th:text="${record.doctorFullName}"></div>
                                <div style="font-size:12px;color:#64748b;" th:text="${record.departmentName}"></div>
                            </td>
                            <td th:text="${record.serviceName}"></td>
                            <td>
                                <span style="font-size:13px;color:#334155;" th:text="${record.diagnosis != null and record.diagnosis.length() > 50}
                                           ? ${record.diagnosis.substring(0, 50)} + '...'
                                           : ${record.diagnosis}"></span>
                            </td>
                            <td>
                                <span class="status-badge"
                                    th:classappend="${record.status == 'FINALIZED'} ? 'status-completed' : 'status-pending'"
                                    th:text="${record.status == 'FINALIZED'} ? 'Đã hoàn tất' : 'Nháp'"></span>
                            </td>
                            <td>
                                <a th:href="@{/patient/records/{id}(id=${record.id})}"
                                    style="color:#0f4c81;font-size:15px;text-decoration:none;" title="Xem chi tiết">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="patient-table-footer" th:text="${#lists.size(records)} + ' hồ sơ bệnh án'"></div>
            </div>

        </main>
    </div>
</body>

</html>
