<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dịch vụ khám</title>
    <link rel="stylesheet" th:href="@{/css/patient/patient-common.css}">
    <link rel="stylesheet" th:href="@{/css/patient/patient-appointment.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .service-title-link {
            color: #0f172a;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .service-title-link:hover {
            color: #0f4c81;
            text-decoration: underline;
        }
        .service-card-link:hover .service-img {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="patient-layout">
        <div th:replace="~{patient/fragments/sidebar :: patientSidebar('services')}"></div>
        <main class="patient-main">

            <!-- Header -->
            <div class="patient-page-header">
                <div>
                    <h2>Dịch vụ khám</h2>
                    <p>Danh sách các dịch vụ khám chữa bệnh theo chuyên khoa</p>
                </div>
                <a th:href="@{/patient/appointments/book}" class="btn-primary">
                    <i class="bi bi-calendar-plus"></i> Đặt lịch khám
                </a>
            </div>

            <!-- Filter theo khoa -->
            <div class="appt-filter-bar" style="flex-wrap:wrap;gap:8px;">
                <a th:href="@{/patient/services}" class="appt-filter-btn"
                    th:classappend="${selectedDepartmentId == null} ? ' active'">Tất cả</a>
                <a th:each="dept : ${departments}" th:href="@{/patient/services(departmentId=${dept.id})}"
                    class="appt-filter-btn"
                    th:classappend="${selectedDepartmentId != null and selectedDepartmentId == dept.id} ? ' active'"
                    th:text="${dept.name}">Khoa</a>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(services)}" class="patient-card" style="margin-top:8px;">
                <div class="empty-state">
                    <i class="bi bi-clipboard2-x" style="font-size:40px;"></i>
                    <p>Không có dịch vụ nào trong khoa này</p>
                    <a th:href="@{/patient/services}" class="btn-secondary" style="margin-top:8px;">
                        Xem tất cả dịch vụ
                    </a>
                </div>
            </div>

            <!-- Danh sách dịch vụ -->
            <div th:unless="${#lists.isEmpty(services)}"
                style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:8px;">

                <div th:each="svc : ${services}" class="patient-card service-card-link"
                    style="padding:0;overflow:hidden;display:flex;flex-direction:column;">

                    <!-- Ảnh dịch vụ hoặc placeholder -->
                    <a th:href="@{/patient/services/{id}(id=${svc.id})}" style="display:block;text-decoration:none;">
                        <div th:if="${svc.imageUrl != null}" style="height:140px;overflow:hidden;">
                            <img th:src="${svc.imageUrl}" alt="service" style="width:100%;height:100%;object-fit:cover;transition:transform 0.3s;" class="service-img">
                        </div>
                        <div th:if="${svc.imageUrl == null}" style="height:140px;background:linear-gradient(135deg,#eff6ff,#dbeafe);
                                display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-clipboard2-pulse" style="font-size:48px;color:#3b82f6;opacity:0.5;"></i>
                        </div>
                    </a>

                    <!-- Nội dung -->
                    <div style="padding:16px;flex:1;display:flex;flex-direction:column;gap:8px;">

                        <!-- Tên dịch vụ -->
                        <div style="font-size:15px;font-weight:700;">
                            <a th:href="@{/patient/services/{id}(id=${svc.id})}" class="service-title-link" th:text="${svc.name}"></a>
                        </div>

                        <!-- Khoa -->
                        <div th:if="${svc.department != null}" style="font-size:12px;color:#1d4ed8;font-weight:600;">
                            <i class="bi bi-hospital" style="margin-right:4px;"></i>
                            <span th:text="${svc.department.name}"></span>
                        </div>

                        <!-- Mô tả -->
                        <div th:if="${svc.description != null}" style="font-size:13px;color:#64748b;line-height:1.5;
                                display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                            th:text="${svc.description}"></div>

                        <!-- Giá + thời gian -->
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                            <div th:if="${svc.referencePrice != null}"
                                style="font-size:14px;font-weight:700;color:#0f4c81;">
                                <i class="bi bi-cash-coin" style="margin-right:4px;"></i>
                                <span
                                    th:text="${#numbers.formatDecimal(svc.referencePrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                            </div>
                            <div th:if="${svc.estimatedDuration != null}" style="font-size:12px;color:#94a3b8;">
                                <i class="bi bi-clock" style="margin-right:4px;"></i>
                                <span th:text="${svc.estimatedDuration} + ' phút'"></span>
                            </div>
                        </div>

                        <!-- Nút đặt lịch -->
                        <a th:href="@{/patient/appointments/book}"
                            class="btn-primary" style="justify-content:center;font-size:13px;margin-top:auto;">
                            <i class="bi bi-calendar-plus"></i> Đặt lịch
                        </a>
                    </div>
                </div>
            </div>

            <div style="margin-top:12px;font-size:13px;color:#94a3b8;" th:unless="${#lists.isEmpty(services)}"
                th:text="'Hiển thị ' + ${#lists.size(services)} + ' dịch vụ (Trang ' + ${currentPage} + '/' + ${totalPages} + ')'"></div>

            <!-- Phân trang -->
            <div th:if="${totalPages > 1}" style="display: flex; justify-content: center; margin-top: 30px; margin-bottom: 20px;">
                <ul style="display: flex; list-style: none; padding: 0; gap: 8px; margin: 0;">
                    <li th:if="${currentPage > 1}">
                        <a th:href="@{/patient/services(page=${currentPage - 1}, departmentId=${selectedDepartmentId})}" 
                           style="display: block; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b; background: white; transition: all 0.2s; font-size: 14px;">
                           <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    
                    <li th:each="i : ${#numbers.sequence(1, totalPages)}">
                        <a th:href="@{/patient/services(page=${i}, departmentId=${selectedDepartmentId})}" 
                           th:text="${i}"
                           th:style="${currentPage == i} ? 'display: block; padding: 8px 14px; border: 1px solid #0284c7; border-radius: 6px; text-decoration: none; color: white; background-color: #0284c7; font-weight: 600; font-size: 14px;' : 'display: block; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b; background: white; transition: all 0.2s; font-size: 14px;'"></a>
                    </li>
                    
                    <li th:if="${currentPage < totalPages}">
                        <a th:href="@{/patient/services(page=${currentPage + 1}, departmentId=${selectedDepartmentId})}" 
                           style="display: block; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b; background: white; transition: all 0.2s; font-size: 14px;">
                           <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </div>

        </main>
    </div>
</body>

</html>
