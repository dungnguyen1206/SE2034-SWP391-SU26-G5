<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên khoa - HAMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f8fafc; }
        
        .guest-navbar {
            position: sticky; top: 0; z-index: 100;
            background: #fff; border-bottom: 1px solid #e2e8f0;
            padding: 0 48px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
        }
        .guest-brand { 
            display:flex; align-items:center; gap:10px;
            font-size:22px; font-weight:800; color:#0f4c81;
            text-decoration:none;
        }
        .guest-brand i { font-size:26px; color:#2563eb; }
        .guest-nav { display:flex; gap:32px; list-style:none; }
        .guest-nav a { 
            color:#475569; text-decoration:none;
            font-size:14px; font-weight:500;
        }
        .guest-nav a.active { color:#2563eb; font-weight:700; }
        .guest-actions { display:flex; gap:10px; }
        .btn-go { 
            padding:8px 18px; border:1.5px solid #2563eb;
            border-radius:8px; color:#2563eb;
            font-size:14px; font-weight:600; text-decoration:none;
        }
        .btn-gf { 
            padding:8px 18px; background:#2563eb;
            border-radius:8px; color:#fff;
            font-size:14px; font-weight:600; text-decoration:none;
        }
        
        .container {
            max-width:1100px; margin:0 auto;
            padding:32px 48px 64px;
        }
        .page-header {
            margin-bottom:24px;
        }
        .page-header h2 {
            font-size:24px; font-weight:800;
            color:#0f172a;
        }
        .page-header p {
            font-size:14px; color:#64748b;
            margin-top:4px;
        }
        
        .empty-state {
            background:#fff; border-radius:14px;
            border:1px solid #e2e8f0;
            padding:56px; text-align:center; color:#94a3b8;
        }
        .empty-state i {
            font-size:40px; display:block; margin-bottom:12px;
        }
        
        .dept-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:20px;
        }
        .dept-card {
            background:#fff; border-radius:14px;
            border:1px solid #e2e8f0; overflow:hidden;
            display:flex; flex-direction:column;
            box-shadow:0 1px 4px rgba(0,0,0,.04);
        }
        .dept-image {
            height:140px; overflow:hidden;
        }
        .dept-image img {
            width:100%; height:100%; object-fit:cover;
        }
        .dept-placeholder {
            height:140px;
            background:linear-gradient(135deg,#eff6ff,#dbeafe);
            display:flex; align-items:center; justify-content:center;
        }
        .dept-placeholder i {
            font-size:52px; color:#3b82f6; opacity:.4;
        }
        .dept-body {
            padding:18px; flex:1;
            display:flex; flex-direction:column; gap:8px;
        }
        .dept-name {
            font-size:15px; font-weight:700; color:#0f172a;
        }
        .dept-desc {
            font-size:13px; color:#64748b; line-height:1.5;
            display:-webkit-box; -webkit-line-clamp:2;
            -webkit-box-orient:vertical; overflow:hidden;
        }
        .dept-actions {
            display:flex; gap:8px;
            margin-top:auto; padding-top:10px;
        }
        .btn-outline {
            flex:1; padding:9px 8px; text-align:center;
            border-radius:8px; border:1.5px solid #e2e8f0;
            color:#475569; font-size:13px; font-weight:600;
            text-decoration:none;
            display:flex; align-items:center;
            justify-content:center; gap:5px;
        }
        .btn-primary {
            flex:1; padding:9px 8px; text-align:center;
            border-radius:8px; background:#2563eb;
            color:#fff; font-size:13px; font-weight:600;
            text-decoration:none;
            display:flex; align-items:center;
            justify-content:center; gap:5px;
        }
    </style>
</head>
<body>

<nav class="guest-navbar">
    <a href="/home" class="guest-brand">
        <i class="bi bi-hospital"></i> HAMS
    </a>
    <ul class="guest-nav">
        <li><a href="/home">Trang chủ</a></li>
        <li><a href="/public/departments" class="active">Chuyên khoa</a></li>
    </ul>
    <div class="guest-actions" sec:authorize="!isAuthenticated()">
        <a href="/login" class="btn-go">Đăng nhập</a>
        <a href="/register" class="btn-gf">Đăng ký</a>
    </div>
    <div class="guest-actions" sec:authorize="isAuthenticated()">
        <span style="color:#64748b;font-size:14px;" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-go">Đăng xuất</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h2>Chuyên khoa</h2>
        <p>Xem thông tin các khoa và đội ngũ bác sĩ</p>
    </div>

    <div th:if="${#lists.isEmpty(departments)}" class="empty-state">
        <i class="bi bi-building-x"></i>
        <p>Chưa có chuyên khoa nào</p>
    </div>

    <div th:unless="${#lists.isEmpty(departments)}" class="dept-grid">
        <div th:each="dept : ${departments}" class="dept-card">
            <div th:if="${dept.imageUrl != null}" class="dept-image">
                <img th:src="${dept.imageUrl}" th:alt="${dept.name}">
            </div>
            <div th:if="${dept.imageUrl == null}" class="dept-placeholder">
                <i class="bi bi-hospital"></i>
            </div>
            <div class="dept-body">
                <div class="dept-name" th:text="${dept.name}"></div>
                <div th:if="${dept.description != null}" 
                     class="dept-desc" th:text="${dept.description}"></div>
                <div class="dept-actions">
                    <a th:href="@{/public/departments/{id}(id=${dept.id})}" class="btn-outline">
                        <i class="bi bi-info-circle"></i> Chi tiết
                    </a>
                    <!-- Chỉ hiện nút đặt lịch nếu đã đăng nhập -->
                    <a sec:authorize="hasAuthority('ROLE_PATIENT')"
                       th:href="@{/patient/appointments/book/step2(departmentId=${dept.id})}" 
                       class="btn-primary">
                        <i class="bi bi-calendar-plus"></i> Đặt lịch
                    </a>
                    <a sec:authorize="!hasAuthority('ROLE_PATIENT')" 
                       href="/login" class="btn-primary">
                        <i class="bi bi-calendar-plus"></i> Đặt lịch
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
