<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - HIMS</title>
    <!-- FontAwesome CDN for modern vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local preview fallback + Thymeleaf reference -->
    <link rel="stylesheet" href="../../static/css/common.css" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="../../static/css/auth/auth.css" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Register Card with Dark Slate-Blue Background Pane -->
        <div class="auth-left">
            <div class="auth-card">
                <h2 class="auth-card-title">Đăng ký</h2>
                
                <form th:action="@{/register}" method="POST">
                    <!-- Full Name Input -->
                    <div class="input-group">
                        <label class="input-label" for="fullName">Họ và tên</label>
                        <input type="text" id="fullName" name="fullName" class="auth-input" placeholder="Nhập họ và tên" required autofocus>
                    </div>
                    
                    <!-- Email (Gmail) Input -->
                    <div class="input-group">
                        <label class="input-label" for="email">Email (Gmail)</label>
                        <input type="email" id="email" name="email" class="auth-input" placeholder="example@gmail.com" required>
                    </div>
                    
                    <!-- Phone Input -->
                    <div class="input-group">
                        <label class="input-label" for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" name="phone" class="auth-input" placeholder="Nhập số điện thoại" required>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" class="auth-input" placeholder="Tạo mật khẩu" required>
                    </div>
                    
                    <!-- Confirm Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="confirmPassword">Xác nhận mật khẩu</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="auth-input" placeholder="Nhập lại mật khẩu" required>
                    </div>
                    
                    <!-- Form Actions: Register Button -->
                    <div class="auth-footer-actions">
                        <button type="submit" class="auth-btn" style="width: 100%;">Đăng ký</button>
                    </div>
                </form>
                
                <!-- Login Link Hint -->
                <div class="auth-nav-hint">
                    Đã có tài khoản?
                    <a href="login.html" th:href="@{/login}">Đăng nhập</a>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Brand Logo and Illustration on Light Gray -->
        <div class="auth-right">
            <div class="auth-logo-top">
                <span class="logo-circle"></span>
                <span>HIMS</span>
            </div>
            
            <div class="auth-illustration-container">
                <img src="../../static/images/illustration.png" th:src="@{/images/illustration.png}" alt="HIMS Illustration" class="auth-illustration">
            </div>
        </div>
    </div>
</body>
</html>
