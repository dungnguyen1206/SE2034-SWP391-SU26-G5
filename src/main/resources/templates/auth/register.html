<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - HAMS</title>
    <!-- FontAwesome CDN for modern vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local preview fallback + Thymeleaf reference -->
    <link rel="stylesheet" href="../../static/css/auth/auth.css" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <!-- Guest Home Button -->
    <a href="/" class="btn-guest-home">
        <i class="fa-solid fa-house"></i> Về trang chủ
    </a>

    <div class="auth-container">
        <!-- Left Side: Register Card -->
        <div class="auth-left">
            <div class="auth-card">
                <h2 class="auth-card-title">Đăng ký</h2>
                
                <!-- General Alert Message for All Errors -->
                <div th:if="${error != null}" class="auth-alert error">
                    <i class="fa-solid fa-circle-exclamation"></i> 
                    <span th:text="${error}">Lỗi đăng ký</span>
                </div>

                <form th:action="@{/register}" th:object="${registerRequest}" method="POST">
                    <!-- Username Input -->
                    <div class="input-group">
                        <label class="input-label" for="username">Tên đăng nhập</label>
                        <input type="text" id="username" th:field="*{username}" class="auth-input" placeholder="Tên đăng nhập" autofocus>
                    </div>

                    <!-- Names Group: Họ, Tên đệm, Tên -->
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label class="input-label" for="lastName">Họ</label>
                            <input type="text" id="lastName" th:field="*{lastName}" class="auth-input" placeholder="Họ">
                        </div>
                        
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label class="input-label" for="middleName">Tên đệm</label>
                            <input type="text" id="middleName" th:field="*{middleName}" class="auth-input" placeholder="Tên đệm">
                        </div>

                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label class="input-label" for="firstName">Tên</label>
                            <input type="text" id="firstName" th:field="*{firstName}" class="auth-input" placeholder="Tên">
                        </div>
                    </div>
                    
                    <!-- Email Input -->
                    <div class="input-group">
                        <label class="input-label" for="email">Gmail</label>
                        <input type="email" id="email" th:field="*{email}" class="auth-input" placeholder="nguyenvana@gmail.com">
                    </div>
                    
                    <!-- Phone Input -->
                    <div class="input-group">
                        <label class="input-label" for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" th:field="*{phone}" class="auth-input" placeholder="Nhập số điện thoại" required>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="password">Mật khẩu</label>
                        <input type="password" id="password" th:field="*{password}" class="auth-input" placeholder="Tạo mật khẩu">
                    </div>
                    
                    <!-- Confirm Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="confirmPassword">Xác nhận mật khẩu</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="auth-input" placeholder="Nhập lại mật khẩu">
                    </div>
                    
                    <!-- OTP Channel Selector -->
                    <div class="otp-channel-group">
                        <label class="input-label">Nhận mã OTP qua</label>
                        <div class="otp-channel-options">
                            <div class="otp-channel-option">
                                <input type="radio" id="channelEmail" name="otpChannel" value="email" checked onchange="toggleEmailRequired()">
                                <label for="channelEmail">
                                    <i class="fa-solid fa-envelope"></i> Email
                                </label>
                            </div>
                            <div class="otp-channel-option">
                                <input type="radio" id="channelSms" name="otpChannel" value="sms" onchange="toggleEmailRequired()">
                                <label for="channelSms">
                                    <i class="fa-solid fa-comment-sms"></i> SMS
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Form Actions: Register Button -->
                    <div class="auth-footer-actions">
                        <button type="submit" class="auth-btn" style="width: 100%;">Đăng ký</button>
                    </div>
                </form>
                
                <!-- Login Link Hint -->
                <div class="auth-nav-hint">
                    Đã có tài khoản?
                    <a href="login.html" th:href="@{/login}">Đăng nhập</a>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Brand Logo and Illustration -->
        <div class="auth-right">
            <div class="auth-logo-top">
                <span class="logo-circle"></span>
                <span>HAMS</span>
            </div>
            
            <div class="auth-illustration-container">
                <img src="../../static/images/khoa-san-benh-vien-fv-2022.jpg" th:src="@{/images/khoa-san-benh-vien-fv-2022.jpg}" alt="HAMS Illustration" class="auth-illustration">
            </div>
        </div>
    </div>

    <script>
        function toggleEmailRequired() {
            var emailRadio = document.getElementById('channelEmail');
            var emailInput = document.getElementById('email');
            
            if (emailRadio.checked) {
                emailInput.setAttribute('required', 'required');
            } else {
                emailInput.removeAttribute('required');
            }
        }
        
        // Initialize state on load
        document.addEventListener("DOMContentLoaded", function() {
            toggleEmailRequired();
        });
    </script>
</body>
</html>
