<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - HAMS</title>
    <!-- FontAwesome CDN for modern vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local preview fallback + Thymeleaf reference -->
    <link rel="stylesheet" href="../../static/css/auth/auth.css" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Forgot Password Card with Dark Slate-Blue Background Pane -->
        <div class="auth-left">
            <div class="auth-card">
                <h2 class="auth-card-title">Quên mật khẩu</h2>
                <p class="auth-card-subtitle">
                    Nhập địa chỉ Gmail của bạn để nhận mã xác minh đặt lại mật khẩu.
                </p>
                
                <form th:action="@{/forgot-password}" method="POST">
                    <!-- Email Input -->
                    <div class="input-group">
                        <label class="input-label" for="email">Gmail</label>
                        <input type="email" id="email" name="email" class="auth-input" placeholder="nguyenvana@gmail.com" required autofocus>
                    </div>
                    
                    <!-- Form Actions: Send Code Button -->
                    <div class="auth-footer-actions">
                        <button type="submit" class="auth-btn" style="width: 100%;">Gửi mã xác minh</button>
                    </div>
                </form>
                
                <!-- Back to Login Hint -->
                <div class="auth-nav-hint">
                    <a href="login.html" th:href="@{/login}">
                        <i class="fa-solid fa-arrow-left" style="margin-right: 6px; font-size: 0.8rem;"></i>
                        Quay lại Đăng nhập
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Brand Logo and Illustration on Light Gray -->
        <div class="auth-right">
            <div class="auth-logo-top">
                <span class="logo-circle"></span>
                <span>HAMS</span>
            </div>
            
            <div class="auth-illustration-container">
                <img src="../../static/images/khoa-san-benh-vien-fv-2022.jpg" th:src="@{/images/khoa-san-benh-vien-fv-2022.jpg}" alt="HAMS Illustration" class="auth-illustration">
            </div>
        </div>
    </div>
</body>
</html>
