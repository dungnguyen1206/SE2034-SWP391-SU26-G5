<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - HAMS</title>
    <!-- FontAwesome CDN for modern vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local preview fallback + Thymeleaf reference -->
    <link rel="stylesheet" href="../../static/css/auth/auth.css" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <!-- Guest Home Button -->
    <a href="/" class="btn-guest-home">
        <i class="fa-solid fa-house"></i> Về trang chủ
    </a>

    <div class="auth-container">
        <!-- Left Side: Forgot Password Card -->
        <div class="auth-left">
            <div class="auth-card">
                <h2 class="auth-card-title">Quên mật khẩu</h2>
                <p class="auth-card-subtitle">
                    Nhập thông tin của bạn để nhận mã xác minh đặt lại mật khẩu.
                </p>
                
                <!-- Alert Messages -->
                <div th:if="${error != null}" class="auth-alert error">
                    <i class="fa-solid fa-circle-exclamation"></i> 
                    <span th:text="${error}">Lỗi gửi mail</span>
                </div>
                
                <form th:action="@{/forgot-password}" method="POST">
                    <!-- OTP Channel Selector -->
                    <div class="otp-channel-group">
                        <label class="input-label">Nhận mã OTP qua</label>
                        <div class="otp-channel-options">
                            <div class="otp-channel-option">
                                <input type="radio" id="channelEmail" name="otpChannel" value="email" checked onchange="togglePhoneField()">
                                <label for="channelEmail">
                                    <i class="fa-solid fa-envelope"></i> Email
                                </label>
                            </div>
                            <div class="otp-channel-option">
                                <input type="radio" id="channelSms" name="otpChannel" value="sms" onchange="togglePhoneField()">
                                <label for="channelSms">
                                    <i class="fa-solid fa-comment-sms"></i> SMS
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Email Input -->
                    <div class="input-group" id="emailGroup">
                        <label class="input-label" for="email">Email</label>
                        <input type="email" id="email" name="email" class="auth-input" placeholder="Nhập địa chỉ Email của bạn" required autofocus>
                    </div>

                    <!-- Phone Input (shown when SMS is selected) -->
                    <div class="input-group phone-group-toggle" id="phoneGroup">
                        <label class="input-label" for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" name="phone" class="auth-input" placeholder="Nhập số điện thoại của bạn">
                    </div>
                    
                    <!-- Form Actions: Send Code Button -->
                    <div class="auth-footer-actions">
                        <button type="submit" class="auth-btn" style="width: 100%;">Gửi mã xác minh</button>
                    </div>
                </form>
                
                <!-- Back to Login Hint -->
                <div class="auth-nav-hint">
                    <a href="login.html" th:href="@{/login}">
                        <i class="fa-solid fa-arrow-left" style="margin-right: 6px; font-size: 0.8rem;"></i>
                        Quay lại Đăng nhập
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Brand Logo and Illustration -->
        <div class="auth-right">
            <div class="auth-logo-top">
                <span class="logo-circle"></span>
                <span>HAMS</span>
            </div>
            
            <div class="auth-illustration-container">
                <img src="../../static/images/khoa-san-benh-vien-fv-2022.jpg" th:src="@{/images/khoa-san-benh-vien-fv-2022.jpg}" alt="HAMS Illustration" class="auth-illustration">
            </div>
        </div>
    </div>

    <script>
        function togglePhoneField() {
            var smsRadio = document.getElementById('channelSms');
            var phoneGroup = document.getElementById('phoneGroup');
            var emailGroup = document.getElementById('emailGroup');
            
            if (smsRadio.checked) {
                // SMS mode: Show phone, hide email
                phoneGroup.classList.add('show');
                document.getElementById('phone').setAttribute('required', 'required');
                
                emailGroup.style.display = 'none';
                document.getElementById('email').removeAttribute('required');
            } else {
                // Email mode: Show email, hide phone
                phoneGroup.classList.remove('show');
                document.getElementById('phone').removeAttribute('required');
                
                emailGroup.style.display = 'block';
                document.getElementById('email').setAttribute('required', 'required');
            }
        }
    </script>
</body>
</html>
