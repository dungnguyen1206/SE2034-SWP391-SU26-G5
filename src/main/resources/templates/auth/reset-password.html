<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - HAMS</title>
    <!-- FontAwesome CDN for modern vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local preview fallback + Thymeleaf reference -->
    <link rel="stylesheet" href="../../static/css/auth/auth.css" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <!-- Guest Home Button -->
    <a href="/" class="btn-guest-home">
        <i class="fa-solid fa-house"></i> Về trang chủ
    </a>

    <div class="auth-container">
        <!-- Left Side: Reset Password Card -->
        <div class="auth-left">
            <div class="auth-card">
                <h2 class="auth-card-title">Đặt lại mật khẩu</h2>
                <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5;"
                   th:text="${otpChannel == 'sms'} ? 'Vui lòng nhập mã OTP đã được gửi đến số điện thoại của bạn và đặt mật khẩu mới.' : 'Vui lòng nhập mã OTP đã được gửi đến email của bạn và đặt mật khẩu mới.'">
                    Vui lòng nhập mã OTP đã được gửi đến email của bạn và đặt mật khẩu mới.
                </p>
                
                <!-- Alert Messages -->
                <div th:if="${error != null}" class="auth-alert error">
                    <i class="fa-solid fa-circle-exclamation"></i> 
                    <span th:text="${error}">Mã OTP không chính xác</span>
                </div>
                
                <form th:action="@{/reset-password}" method="POST">
                    <!-- OTP Input -->
                    <div class="input-group">
                        <label class="input-label" for="otp">Mã xác thực OTP</label>
                        <input type="text" id="otp" name="otp" class="auth-input" placeholder="Nhập mã 6 chữ số" required autofocus maxlength="6" pattern="\d{6}" style="text-align: center; font-size: 1.3rem; letter-spacing: 5px;">
                    </div>

                    <!-- Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="newPassword">Mật khẩu mới</label>
                        <input type="password" id="newPassword" name="newPassword" class="auth-input" placeholder="Mật khẩu mới" required>
                    </div>

                    <!-- Confirm Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="confirmNewPassword">Xác nhận mật khẩu</label>
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" class="auth-input" placeholder="Xác nhận mật khẩu" required>
                    </div>
                    
                    <!-- Form Actions: Submit Button -->
                    <div class="auth-footer-actions">
                        <button type="submit" class="auth-btn" style="width: 100%;">Cập nhật mật khẩu</button>
                    </div>
                </form>
                
                <!-- Back Link Hint -->
                <div class="auth-nav-hint">
                    <a href="login.html" th:href="@{/login}">Quay lại trang đăng nhập</a>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Brand Logo and Illustration -->
        <div class="auth-right">
            <div class="auth-logo-top">
                <span class="logo-circle"></span>
                <span>HAMS</span>
            </div>
            
            <div class="auth-illustration-container">
                <img src="../../static/images/khoa-san-benh-vien-fv-2022.jpg" th:src="@{/images/khoa-san-benh-vien-fv-2022.jpg}" alt="HAMS Illustration" class="auth-illustration">
            </div>
        </div>
    </div>
</body>
</html>
