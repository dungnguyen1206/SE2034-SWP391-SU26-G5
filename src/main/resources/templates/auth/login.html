<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HAMS</title>
    <!-- FontAwesome CDN for modern vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local preview fallback + Thymeleaf reference -->
    <link rel="stylesheet" href="../../static/css/auth/auth.css" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Login Card with Dark Slate-Blue Background Pane -->
        <div class="auth-left">
            <div class="auth-card">
                <h2 class="auth-card-title">Đăng nhập</h2>
                
                <!-- Alert Messages -->
                <div th:if="${param.error != null}" class="auth-alert error" style="display: none;" th:style="'display: flex;'">
                    <i class="fa-solid fa-circle-exclamation"></i> Tên đăng nhập hoặc mật khẩu không đúng
                </div>
                <div th:if="${param.logout != null}" class="auth-alert success" style="display: none;" th:style="'display: flex;'">
                    <i class="fa-solid fa-circle-check"></i> Đã đăng xuất thành công
                </div>
                <div th:if="${param.success != null}" class="auth-alert success" style="display: none; background-color: #e6f4ea; border: 1px solid #c2e7cd; color: #137333; padding: 10px; border-radius: 4px; margin-bottom: 15px;" th:style="'display: flex; align-items: center; gap: 8px;'">
                    <i class="fa-solid fa-circle-check"></i> Đăng ký thành công! Vui lòng đăng nhập.
                </div>
                
                <form th:action="@{/login}" method="POST">
                    <!-- Username Input (Gmail) -->
                    <div class="input-group">
                        <label class="input-label" for="username">Gmail</label>
                        <input type="email" id="username" name="username" class="auth-input" placeholder="Nhập Gmail của bạn" required autofocus>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="input-group">
                        <label class="input-label" for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" class="auth-input" placeholder="Nhập mật khẩu của bạn" required>
                    </div>
                    
                    <!-- Form Actions: Login Button + Forgot Password Link -->
                    <div class="auth-footer-actions">
                        <button type="submit" class="auth-btn">Đăng nhập</button>
                        <a href="forgot-password.html" th:href="@{/forgot-password}" class="forgot-link">Quên mật khẩu?</a>
                    </div>
                </form>
                
                <!-- Registration Link Hint -->
                <div class="auth-nav-hint">
                    Chưa có tài khoản?
                    <a href="register.html" th:href="@{/register}">Đăng ký ngay</a>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Brand Logo and Illustration on Light Gray -->
        <div class="auth-right">
            <div class="auth-logo-top">
                <span class="logo-circle"></span>
                <span>HAMS</span>
            </div>
            
            <div class="auth-illustration-container">
                <img src="../../static/images/khoa-san-benh-vien-fv-2022.jpg" th:src="@{/images/khoa-san-benh-vien-fv-2022.jpg}" alt="HAMS Illustration" class="auth-illustration">
            </div>
        </div>
    </div>
</body>
</html>
